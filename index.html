<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>Lens</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
button { border: none; background: none; font: inherit; color: inherit; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer; }

:root {
  --lens:          #372549;
  --lens-deep:     #2A1C38;
  --lens-dark:     #1E132A;
  --ruby:          #B75D69;
  --emerald:       #1E9E7E;
  --lens-surface:  #F7F5FA;
  --lens-tint:     #EDE9F4;
  --lens-tint-bd:  #CFC8DF;
  --active-bg:     #E2DBEF;
  --active-border: #7C5FA0;
  --screen:        #FFFFFF;
  --row-lens:      #FFFFFF;
  --row-user:      #FFFFFF;
  --border:        #E2E2E7;
  --sep:           rgba(55,37,73,0.10);
  --sep-defined:   rgba(55,37,73,0.18);
  --text-head:     #111111;
  --text-body:     #3A3A3A;
  --text-meta:     #9A9AA6;
  --text-muted:    #888;
  --person:        #B75D69;
  --person-bg:     #F4E3E6;
  --glass:         rgba(255,255,255,0.85);
  --glass-border:  rgba(55,37,73,0.12);
  --gray-50:       #F3F3F3;
  --gray-100:      #E8E8E8;
  --gray-200:      #D4D4D4;
  --gray-border:   #DDDDDD;
}

html, body { height: 100%; height: 100dvh; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F0F0F2;
  color: var(--text-body);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
}

/* =========================================================================
   MOBILE: phone frame (visible <768px)
   ========================================================================= */
.phone-frame {
  width: 390px;
  height: 844px;
  background: var(--screen);
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
}

.status-bar {
  height: 54px;
  padding: 14px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 100;
  flex-shrink: 0;
  background: #fff;
}
.status-time { font-size: 15px; font-weight: 600; color: var(--text-body); }
.status-icons { font-size: 12px; color: var(--text-body); letter-spacing: 3px; }
.dynamic-island {
  width: 120px; height: 34px;
  background: #000; border-radius: 20px;
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
}

.content-area {
  position: relative;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* Screen header: centered title + squiggle */
.screen-header {
  flex-shrink: 0;
  padding: 8px 20px 12px;
  text-align: center;
  background: #fff;
}
.screen-title {
  display: block;
  font-size: 26px;
  font-weight: 800;
  color: var(--lens);
  letter-spacing: -0.8px;
  line-height: 1.1;
}
.brand-lens {
  font-family: 'Lora', Georgia, serif;
  font-style: normal;
  font-weight: 600;
  font-size: 26px;
  letter-spacing: -0.2px;
  color: var(--lens);
}
.squiggle {
  display: block;
  margin: 3px auto 0;
}
.screen-count {
  position: absolute;
  right: 20px;
  top: 14px;
  font-size: 11px;
  color: var(--text-meta);
  font-weight: 500;
}

/* =========================================================================
   VIEWS
   ========================================================================= */
.stories-view, .ask-view, .save-view {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--screen);
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.stories-view.hidden, .ask-view.hidden, .save-view.hidden {
  opacity: 0; pointer-events: none; transform: scale(0.97);
}

/* Stories header wrapper holds both title and filter chips */
.stories-view .screen-header { position: relative; }

/* Filter chips row */
.filter-chips {
  flex-shrink: 0;
  display: flex;
  gap: 6px;
  padding: 4px 16px 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.1px;
  color: var(--lens);
  background: rgba(55,37,73,0.07);
  border: 1px solid rgba(55,37,73,0.16);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.filter-chip.active {
  background: var(--lens);
  color: #fff;
  border-color: var(--lens);
}

/* =========================================================================
   ROW LANGUAGE — shared between Stories, Saved, Chat
   ========================================================================= */
.row-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}
.row-list::-webkit-scrollbar { width: 0; }
.row-list { scrollbar-width: none; }

.feed-row {
  width: 100%;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 0;
  position: relative;
  background: var(--row-lens);
  cursor: pointer;
  transition: filter 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.feed-row:active { filter: brightness(0.97); }
.feed-row::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: var(--sep);
}

.row-body { flex: 1; min-width: 0; }

.row-badge {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.2px;
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 7px;
  background: transparent;
  color: var(--active-border);
  border: 1px solid var(--active-border);
}
.feed-row.is-read .row-badge {
  color: #B0AAD8;
  border-color: #B0AAD8;
}

.row-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-body);
  line-height: 1.4;
  margin-bottom: 6px;
}
.feed-row.is-read .row-title { font-weight: 500; color: #666; }

.row-preview {
  font-size: 14.5px;
  font-weight: 400;
  color: #555;
  line-height: 1.55;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.feed-row.is-read .row-preview { color: #999; }

.row-meta {
  font-size: 13px;
  color: var(--text-meta);
  font-weight: 500;
}

/* Sphere icon (bookmark) on saved rows */
.sphere {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--lens);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 12px;
  box-shadow: 0 2px 6px rgba(55,37,73,0.28);
}

/* =========================================================================
   CHAT ROWS
   ========================================================================= */
.chat-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
  padding-bottom: 4px;
}
.chat-list::-webkit-scrollbar { width: 0; }
.chat-list { scrollbar-width: none; }

.chat-date-divider {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-meta);
  letter-spacing: 0.4px;
  padding: 18px 20px 8px;
  text-transform: uppercase;
}
.chat-row {
  width: 100%;
  padding: 12px 20px;
  position: relative;
  background: var(--row-lens);
}
.chat-row.user-row { background: var(--row-user); }
.chat-row::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: var(--sep);
}

/* Card snapshot at start of a card-origin chat thread (base / mobile) */
.chat-card-ref {
  padding: 14px 20px 16px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}
.chat-card-ref .d-card-title {
  font-size: 19px;
  font-weight: 800;
  color: var(--text-head);
  letter-spacing: -0.3px;
  line-height: 1.3;
  margin: 6px 0 10px;
}
.chat-card-ref .d-card-body {
  font-size: 16px;
  color: #444;
  line-height: 1.6;
  margin-bottom: 12px;
}
.chat-card-ref .d-card-meta {
  font-size: 13px;
  color: var(--text-meta);
  font-weight: 500;
  margin-top: 10px;
}

.chat-sender-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}
.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.avatar.lens-av { background: var(--active-border); }
.avatar.user-av { background: var(--ruby); }
.user-initial { font-size: 11px; font-weight: 700; line-height: 1; color: #fff; }

.chat-sender {
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.chat-sender.s-lens { color: var(--active-border); }
.chat-sender.s-user { color: var(--person); }

.chat-text {
  font-size: 15px;
  color: var(--text-body);
  line-height: 1.6;
  font-weight: 400;
}
.chat-text .typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 4px 0;
  align-items: center;
}
.chat-text .typing-indicator span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(55,37,73,0.45);
  animation: typingBounce 1.4s ease-in-out infinite;
}
.chat-text .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.chat-text .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Bridged card inside chat — same row language, with expand/collapse */
.chat-card-row {
  padding: 14px 20px;
  background: var(--row-lens);
  position: relative;
  border-top: 1px solid rgba(55,37,73,0.18);
  border-bottom: 1px solid rgba(55,37,73,0.18);
}
.chat-card-row .row-badge { background: rgba(55,37,73,0.14); border: none; color: var(--lens); }
.chat-card-row .row-title { margin-bottom: 6px; }
.chat-card-row .chat-card-body {
  font-size: 13px;
  color: #444;
  line-height: 1.6;
  display: none;
  margin-top: 2px;
}
.chat-card-row.expanded .chat-card-body { display: block; }
.chat-card-row .chat-card-ellipsis {
  font-size: 15px;
  color: var(--text-meta);
  letter-spacing: 2px;
  line-height: 1;
  padding: 2px 0 0;
}
.chat-card-row.expanded .chat-card-ellipsis { display: none; }
.chat-card-row .chat-card-toggle {
  margin-top: 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--lens);
  cursor: pointer;
}

/* =========================================================================
   CHAT INPUT BAR
   ========================================================================= */
.chat-input-bar {
  flex-shrink: 0;
  padding: 10px 14px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--screen);
  border-top: 1px solid var(--sep);
}
.chat-input-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}
.chat-input {
  width: 100%;
  background: #fff;
  border: 1px solid rgba(55,37,73,0.16);
  border-radius: 16px;
  padding: 11px 44px 11px 16px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  color: var(--text-body);
  outline: none;
  resize: none;
  overflow: hidden;
  min-height: 42px;
  max-height: 120px;
  line-height: 1.4;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.chat-input::placeholder { color: #BBB; }
.chat-input:focus {
  border-color: var(--lens);
  box-shadow: 0 0 0 3px rgba(55,37,73,0.08);
}
.mic-btn {
  position: absolute;
  right: 6px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mic-btn svg { width: 17px; height: 17px; stroke: var(--lens-deep); stroke-width: 1.8; fill: none; }
.mic-btn:hover { background: rgba(55,37,73,0.08); }
.mic-btn.recording { background: rgba(232, 74, 74, 0.12); animation: micPulse 1.5s ease-in-out infinite; }
.mic-btn.recording svg { stroke: #E84A4A; }
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(232, 74, 74, 0.2); }
  50% { box-shadow: 0 0 0 8px rgba(232, 74, 74, 0); }
}
.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--lens);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(55,37,73,0.25);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--lens-dark); transform: scale(1.06); }
.send-btn svg { width: 16px; height: 16px; fill: #fff; }

/* Empty states */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  text-align: center;
  font-size: 14px;
  color: var(--text-meta);
  line-height: 1.5;
  gap: 8px;
}
.empty-state svg { opacity: 0.5; }

/* Mobile chat history list (inside .ask-view) */
.m-chat-history-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
  padding: 0;
}
.m-chat-history-list::-webkit-scrollbar { width: 0; }
.m-chat-history-list { scrollbar-width: none; }
.m-chat-history-list.hidden { display: none; }
.ask-view .chat-list.hidden { display: none; }
.m-chat-history-item {
  padding: 14px 20px;
  position: relative;
  background: transparent;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.m-chat-history-item::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: var(--sep);
}
.m-chat-history-item:active { filter: brightness(0.97); }
.m-chat-history-item-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-body);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.m-chat-history-item-preview {
  font-size: 14.5px;
  font-weight: 400;
  color: #555;
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.m-chat-history-item-ts {
  font-size: 13px;
  color: var(--text-meta);
  margin-top: 7px;
  font-weight: 500;
}
.m-chat-history-empty {
  text-align: center;
  font-size: 13px;
  color: var(--text-meta);
  padding: 40px 20px;
  line-height: 1.5;
}
.m-new-chat-btn, .m-back-btn, .m-search-btn, .m-filter-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 34px; height: 34px;
  background: transparent;
  border: none;
  color: var(--lens-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 32;
}
.m-new-chat-btn { right: 14px; }
.m-back-btn { left: 14px; }
.m-search-btn { right: 52px; }
.m-filter-btn { right: 14px; }
.ask-view .m-search-btn { right: 52px; }
.m-filter-btn.has-filter::after {
  content: '';
  position: absolute;
  top: 6px; right: 6px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--active-border);
  border: 1.5px solid #fff;
}
.m-new-chat-btn svg, .m-back-btn svg, .m-search-btn svg, .m-filter-btn svg { width: 18px; height: 18px; }
.m-new-chat-btn:active, .m-back-btn:active, .m-search-btn:active, .m-filter-btn:active { opacity: 0.6; }

.m-search-panel {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px 12px;
  background: #fff;
  border-bottom: 1px solid var(--sep);
}
.m-search-panel.hidden { display: none; }
.m-search-panel input {
  flex: 1;
  height: 36px;
  padding: 0 14px;
  border-radius: 18px;
  border: 1px solid rgba(55,37,73,0.14);
  background: #fff;
  color: var(--text-body);
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.m-search-panel input::placeholder { color: var(--text-meta); }
.m-search-panel button {
  color: var(--lens);
  font-size: 14px;
  font-weight: 500;
  padding: 6px 8px;
}

/* Mobile filter popover (right-anchored dropdown) */
.m-filter-backdrop {
  position: absolute;
  inset: 0;
  z-index: 30;
  background: transparent;
}
.m-filter-backdrop.hidden { display: none; }
.m-filter-panel {
  position: absolute;
  top: 56px;
  right: 12px;
  z-index: 31;
  width: 220px;
  background: #fff;
  border: 1px solid var(--gray-border);
  border-radius: 14px;
  padding: 6px 0;
  box-shadow: 0 12px 32px rgba(55,37,73,0.14), 0 2px 6px rgba(0,0,0,0.06);
  transform-origin: top right;
  animation: filterPopIn 0.16s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes filterPopIn {
  from { opacity: 0; transform: scale(0.94) translateY(-4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.m-filter-panel.hidden { display: none; }
.m-filter-row {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.m-filter-row:active { background: var(--gray-50); }
.m-filter-check {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--gray-200);
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}
.m-filter-check svg { width: 12px; height: 12px; stroke: #fff; display: none; }
.m-filter-row.checked .m-filter-check {
  background: var(--active-border);
  border-color: var(--active-border);
}
.m-filter-row.checked .m-filter-check svg { display: block; }
.m-filter-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-body);
}
.m-filter-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 14px 4px;
  margin-top: 4px;
  border-top: 1px solid var(--sep);
}
.m-filter-actions button {
  font-size: 13px;
  font-weight: 600;
  color: var(--lens);
  padding: 6px 4px;
}
.m-filter-actions button:disabled { opacity: 0.4; }

/* Mobile chat-input-bar pill send (matches desktop card chat) */
.ask-view .chat-input-bar, .m-card-chat-input-bar { background: transparent; border-top: none; }
.ask-view .chat-list .chat-row, .m-card-chat-msgs .chat-row { background: transparent !important; }
.ask-view .chat-list .chat-row::after,
.m-card-chat-msgs .chat-row::after {
  content: '';
  display: block;
  position: absolute;
  bottom: 0; left: 20px; right: 20px;
  height: 1px;
  background: var(--sep);
}
.m-card-chat-msgs .chat-row::after { left: 0; right: 0; }
.ask-view .chat-list .chat-row:last-child::after,
.m-card-chat-msgs .chat-row:last-child::after { display: none; }

/* =========================================================================
   BOTTOM TAB BAR (mobile)
   ========================================================================= */
.bottom-tab-bar {
  flex-shrink: 0;
  display: flex;
  height: 60px;
  background: #fff;
  border-top: 1px solid var(--sep);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: #C0BBE5;
  transition: color 0.2s;
  position: relative;
}
.bottom-tab svg {
  width: 22px; height: 22px;
  stroke: currentColor;
  stroke-width: 1.7;
  fill: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.bottom-tab-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1px;
}
.bottom-tab.active { color: var(--lens); }
.bottom-tab.active svg { transform: scale(1.05); }
.bottom-tab.active .bottom-tab-label { font-weight: 600; }
.bottom-tab.active::after { display: none; }

/* =========================================================================
   CARD OVERLAY (mobile) — modal that rises from bottom
   ========================================================================= */
.card-overlay-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(26, 21, 64, 0.3);
  z-index: 40;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.card-overlay-backdrop.active { opacity: 1; pointer-events: auto; }

.card-overlay {
  position: absolute;
  inset: 0;
  z-index: 41;
  background: #FFFFFF;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
  pointer-events: none;
}
.card-overlay.active { transform: translateX(0); pointer-events: auto; }

.overlay-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 14px 18px 10px;
}
.overlay-handle { display: none; }
.overlay-category {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.2px;
  padding: 6px 14px;
  border-radius: 20px;
  background: transparent;
  color: var(--active-border);
  border: 1px solid var(--active-border);
}
.overlay-close {
  width: 34px; height: 34px;
  background: transparent;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--lens-deep);
  transition: opacity 0.2s;
}
.overlay-close:active { opacity: 0.6; }
.overlay-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 4px 24px 24px;
  display: flex;
  flex-direction: column;
}
.overlay-body::-webkit-scrollbar { width: 0; }
.overlay-body {
  scrollbar-width: none;
}
.overlay-headline {
  font-size: 21px;
  font-weight: 700;
  color: var(--text-body);
  line-height: 1.32;
  letter-spacing: -0.3px;
  margin-bottom: 14px;
}
.overlay-text {
  font-size: 16px;
  font-weight: 400;
  color: #444;
  line-height: 1.6;
}
.overlay-sources {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
  padding: 18px 0 0;
  font-size: 13px;
  color: var(--text-meta);
}
.overlay-sources::before {
  content: 'Sources';
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-meta);
  opacity: 0.6;
  margin-right: 4px;
}
.source-link {
  font-size: 13px;
  font-weight: 600;
  color: var(--emerald);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.source-link:hover { opacity: 0.7; }
.source-dot { font-size: 8px; color: var(--text-meta); opacity: 0.4; }
.overlay-meta {
  font-size: 13px;
  color: var(--text-meta);
  margin-top: 14px;
  font-weight: 500;
}

.overlay-footer { display: none; }

/* Mobile card-overlay: inline sphere + divider + card chat */
.m-card-info-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 12px;
}
.m-card-info-bottom .overlay-meta { margin-top: 0; }
.m-card-info-bottom .sphere-wrap { position: relative; flex-shrink: 0; }
.m-card-divider {
  border: none;
  height: 1px;
  background: rgba(0,0,0,0.08);
  margin: 24px 0 4px;
}
.m-card-chat-msgs { display: flex; flex-direction: column; padding-bottom: 8px; }
.m-card-chat-msgs .chat-row { padding: 14px 0; background: transparent !important; }
.m-card-chat-msgs .chat-row::after { display: none; }
.m-card-chat-input-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px 14px;
  background: transparent;
  border-top: none;
}
.m-card-chat-input-bar .chat-input-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.m-card-chat-input-bar .send-btn { width: 42px; height: 42px; }

/* =========================================================================
   SPHERE action affordance (used in mobile overlay + desktop detail)
   ========================================================================= */
.sphere-wrap {
  position: relative;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
}
.action-sphere {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #fff;
  border: 1px solid var(--glass-border);
  color: var(--lens);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
  box-shadow: 0 4px 14px rgba(55,37,73,0.18), 0 1px 3px rgba(0,0,0,0.06);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s;
}
.action-sphere svg {
  width: 62%;
  height: 62%;
  display: block;
  pointer-events: none;
}
.action-sphere:hover { transform: scale(1.06); filter: brightness(0.92); }
.action-sphere.open { filter: brightness(0.82) saturate(1.1); }

.sphere-tray {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 42px;
  height: 42px;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 1;
}
.tray-icon {
  position: absolute;
  top: 0; left: 0;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #fff;
  border: 1px solid var(--glass-border);
  box-shadow: 0 4px 14px rgba(55,37,73,0.18), 0 1px 3px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translate(0, 0) scale(0.5);
  transition: opacity 0.28s ease, transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.tray-icon svg { width: 22px; height: 22px; display: block; }
.tray-icon.tray-save svg { fill: #E8944A; }
.tray-icon.tray-chat svg { fill: var(--lens); }
.tray-icon.tray-copy svg { fill: none; stroke: #3B82F6; }
.sphere-tray.open { pointer-events: auto; }
.sphere-tray.open .tray-icon {
  opacity: 1;
  pointer-events: auto;
}
.sphere-tray.open .tray-icon:nth-child(1) {
  transform: translate(0, -52px) scale(1);
  transition-delay: 0.02s;
}
.sphere-tray.open .tray-icon:nth-child(2) {
  transform: translate(0, -104px) scale(1);
  transition-delay: 0.10s;
}

.sphere-toast {
  position: absolute;
  bottom: 58px;
  right: 0;
  padding: 8px 14px;
  background: rgba(26,26,46,0.92);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(6px);
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 4;
  white-space: nowrap;
}
.sphere-toast.visible { opacity: 1; transform: translateY(0); }

/* Source tooltip */
.source-tooltip {
  position: fixed;
  z-index: 200;
  max-width: 240px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(55,37,73,0.15), 0 2px 8px rgba(0,0,0,0.06);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-body);
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 0.25s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.source-tooltip.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.source-tooltip strong { color: var(--lens); font-weight: 600; }
.source-tooltip::before {
  content: '';
  position: absolute;
  top: -6px;
  left: var(--caret-left, 50%);
  transform: translateX(-50%);
  width: 12px; height: 6px;
  background: rgba(255,255,255,0.97);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

/* =========================================================================
   DESKTOP FRAME (visible ≥768px)
   ========================================================================= */
.desktop-frame { display: none; }

/* =========================================================================
   MEDIA — FULL-SCREEN mobile (≤430px)
   ========================================================================= */
@media (max-width: 430px) {
  html, body { background: var(--screen); overflow: hidden; }
  body { padding: 0; align-items: stretch; justify-content: stretch; }
  .phone-frame {
    width: 100%;
    height: 100%;
    border-radius: 0;
    box-shadow: none;
  }
  .status-bar { display: none; }
  .dynamic-island { display: none; }
  .chat-input { font-size: 16px; }
}

   MEDIA — DESKTOP (≥768px)
   ========================================================================= */

  /* App top bar — product header (search, etc.) */

  .app-company-mark {

  }
  .app-company-name {

  }

    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .app-navtab:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .app-navtab.active { background: rgba(255,255,255,0.14); color: #fff; font-weight: 700; }
  .app-user-chip {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .app-user-chip .avatar { width: 28px; height: 28px; }
  .app-user-chip .user-initial { font-size: 12px; }
  .app-user-chip .chat-sender { font-size: 13px; font-weight: 700; letter-spacing: 0.1px; }

  .app-content {
    flex: 1;

    background: #fff;
    display: flex;
    overflow: hidden;
  }
  .dscr { display: none; flex: 1; min-height: 0; }
  .dscr.d-active { display: flex; }

  /* Stories + Saved: master-detail */
  .dscr.master-detail { flex-direction: row; }
  .d-list-col {

  }
  .d-search {

  }
  .d-search:focus-within {

    box-shadow: 0 0 0 3px rgba(55,37,73,0.08);
  }
  .d-search svg { width: 14px; height: 14px; stroke: #9A94B0; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .d-search input {
    flex: 1; min-width: 0;
    border: none; outline: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-body);
  }
  .d-search input::placeholder { color: #A8A3BD; }
  .d-filter-btn {
    flex-shrink: 0;
    width: 32px; height: 32px;

  }
  .d-filter-btn:hover { background: rgba(55,37,73,0.06); color: var(--lens); }

  .d-filter-pop {

  .d-list-col .row-list { overflow-y: visible; }

    display: flex;

  .d-card-title {

    display: block;

    bottom: 0; left: 0; right: 0;

    background: var(--sep);
  }
  .d-detail-col .d-card-chat-msgs .chat-row:last-child::after { display: none; }
  .d-card-chat-input-bar {
    display: none;
    align-items: center;

  /* Screen count float for Saved */

  /* Gmail-style elevated hover on card previews */

/* Breathe animation on screen (subtle) */

      { isNew: true, createdAt: 'April 17, 2026', headline: 'Expansion revenue came in at 125% of plan this quarter.', body: 'The outperformance is concentrated in existing accounts adding seats and modules. The one account that left cited a specific integration gap, not broad dissatisfaction, though it\'s one data point.', sources: [{ system: 'QuickBooks', record: 'Q1 Revenue Summary' }, { system: 'Salesforce', record: 'Expansion Deals' }] },

  if (!removedFromStories[entry.sourceBubble]) removedFromStories[entry.sourceBubble] = new Set();

// =========================================================================
// FEED RENDERING
// =========================================================================
function buildFeedData() {
  const items = [];
  const categoryOrder = ['market', 'revenue', 'customers', 'ops', 'team'];
  categoryOrder.forEach(bubble => {
    const data = insightData[bubble];
    if (!data) return;
    const removed = removedFromStories[bubble] || new Set();
    data.cards.forEach((card, origIdx) => {
      if (removed.has(origIdx)) return;
      items.push({ bubble, origIdx, card });
    });
  });
  items.sort((a, b) => {
    if (a.card.isNew && !b.card.isNew) return -1;
    if (!a.card.isNew && b.card.isNew) return 1;
    return 0;
  });
  return items;
}

function renderRow(bubble, origIdx, card, opts = {}) {
  const readClass = card.isNew ? '' : 'is-read';
  const catTitle = insightData[bubble]?.title || bubble;
  const hidden = (opts.filter && opts.filter !== 'all' && opts.filter !== bubble) ? 'style="display:none;"' : '';
  const onclick = opts.onclick || `openCardOverlay('${bubble}', ${origIdx})`;
  return `
    <div class="feed-row ${readClass}" data-bubble="${bubble}" data-index="${origIdx}" onclick="${onclick}" ${hidden}>
      <div class="row-body">
        <div class="row-badge">${catTitle}</div>
        <div class="row-title">${card.headline}</div>
        <div class="row-preview">${card.body}</div>
        <div class="row-meta">Created &middot; ${card.createdAt || '—'}</div>
      </div>
    </div>`;
}

function renderCardFeed() {
  const items = buildFeedData();
  const html = items.map(({ bubble, origIdx, card }) => renderRow(bubble, origIdx, card, { filter: currentFilter })).join('');
  const mobile = document.getElementById('stories-list');
  const desktop = document.getElementById('d-stories-list');
  if (mobile) mobile.innerHTML = html;
  if (desktop) {
    desktop.innerHTML = items.map(({ bubble, origIdx, card }) =>
      renderRow(bubble, origIdx, card, { filter: currentFilter, onclick: `openDetail('stories','${bubble}',${origIdx})` })
    ).join('');
  }
}

function renderSaveFeed() {
  const countEl = document.getElementById('saved-count');
  if (countEl) countEl.textContent = savedCards.length ? `${savedCards.length} ${savedCards.length === 1 ? 'item' : 'items'}` : '';

  const emptyMsg = `<div class="empty-state">Nothing saved yet.<br>Open a story and save it to bookmark it here.</div>`;

  if (!savedCards.length) {
    const m = document.getElementById('save-feed');
    const d = document.getElementById('d-save-feed');
    if (m) m.innerHTML = emptyMsg;
    if (d) d.innerHTML = emptyMsg;
    return;
  }

  const buildHtml = (getClickFn) => savedCards.map((entry, i) => {
    const card = getSavedCardData(entry);
    if (!card) return '';
    const catTitle = insightData[entry.sourceBubble]?.title || entry.sourceBubble;
    return `
      <div class="feed-row" onclick="${getClickFn(i)}">
        <div class="row-body">
          <div class="row-badge">${catTitle}</div>
          <div class="row-title">${card.headline}</div>
          <div class="row-preview">${card.body}</div>
          <div class="row-meta">Created &middot; ${entry.createdAt}</div>
        </div>
      </div>`;
  }).join('');

  const m = document.getElementById('save-feed');
  const d = document.getElementById('d-save-feed');
  if (m) m.innerHTML = buildHtml(i => `openSavedCard(${i})`);
  if (d) d.innerHTML = buildHtml(i => `openDetail('save',null,null,${i})`);
}

function filterFeed(category) {
  currentFilter = category;
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === category);
  });
  document.querySelectorAll('.d-filter-opt').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.filter === category);
  });
  const fbtn = document.getElementById('d-filter-btn');
  if (fbtn) fbtn.classList.toggle('has-filter', category !== 'all');
  applyStoryFilters();
}

function applyStoryFilters() {
  const q = (document.getElementById('d-search-input')?.value || '').trim().toLowerCase();
  document.querySelectorAll('#stories-list .feed-row, #d-stories-list .feed-row').forEach(row => {
    const matchesCat = (currentFilter === 'all' || row.dataset.bubble === currentFilter);
    const matchesQuery = !q || (row.textContent || '').toLowerCase().includes(q);
    row.style.display = (matchesCat && matchesQuery) ? '' : 'none';
  });
}

function searchStories(v) { applyStoryFilters(); }

function getActiveMobileView() {
  const views = ['stories-view', 'ask-view', 'save-view'];
  for (const id of views) {
    const el = document.getElementById(id);
    if (el && !el.classList.contains('hidden')) return el;
  }
  return null;
}

function toggleMobileSearch(forceState) {
  const view = getActiveMobileView();
  if (!view) return;
  const panel = view.querySelector('.m-search-panel');
  if (!panel) return;
  const willOpen = typeof forceState === 'boolean' ? forceState : panel.classList.contains('hidden');
  document.querySelectorAll('.m-search-panel').forEach(p => p.classList.add('hidden'));
  closeAllMobileFilterPanels();
  if (willOpen) {
    panel.classList.remove('hidden');
    const input = panel.querySelector('input');
    if (input) { input.value = ''; setTimeout(() => input.focus(), 50); }
    filterActiveMobileList('');
  } else {
    filterActiveMobileList('');
  }
}

function onMobileSearchInput(q) { filterActiveMobileList(q); }

let mobileActiveFilters = new Set();
const MOBILE_FILTER_DOMAINS = [
  { key: 'revenue',   label: 'Revenue' },
  { key: 'customers', label: 'Customers' },
  { key: 'ops',       label: 'Ops' },
  { key: 'team',      label: 'Team' },
  { key: 'market',    label: 'Market' }
];

function renderMobileFilterPanel(panel) {
  const rowsHtml = MOBILE_FILTER_DOMAINS.map(d => `
    <div class="m-filter-row${mobileActiveFilters.has(d.key) ? ' checked' : ''}" data-key="${d.key}" onclick="toggleMobileFilterDomain('${d.key}')">
      <div class="m-filter-check">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="m-filter-label">${d.label}</div>
    </div>
  `).join('');
  panel.innerHTML = rowsHtml + `
    <div class="m-filter-actions">
      <button onclick="clearMobileFilters()"${mobileActiveFilters.size === 0 ? ' disabled' : ''}>Clear</button>
      <button onclick="toggleMobileFilter(false)">Done</button>
    </div>
  `;
}

function toggleMobileFilter(forceState) {
  const view = getActiveMobileView();
  if (!view) return;
  const panel = view.querySelector('.m-filter-panel');
  if (!panel) return;
  const willOpen = typeof forceState === 'boolean' ? forceState : panel.classList.contains('hidden');
  closeAllMobileFilterPanels();
  document.querySelectorAll('.m-search-panel').forEach(p => p.classList.add('hidden'));
  if (willOpen) {
    renderMobileFilterPanel(panel);
    panel.classList.remove('hidden');
    requestAnimationFrame(() => {
      if (panel.classList.contains('hidden')) return;
      const backdrop = document.createElement('div');
      backdrop.className = 'm-filter-backdrop';
      backdrop.onclick = () => closeAllMobileFilterPanels();
      panel.parentElement.insertBefore(backdrop, panel);
    });
  }
}

function closeAllMobileFilterPanels() {
  document.querySelectorAll('.m-filter-panel').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.m-filter-backdrop').forEach(b => b.remove());
}

function toggleMobileFilterDomain(key) {
  if (mobileActiveFilters.has(key)) mobileActiveFilters.delete(key);
  else mobileActiveFilters.add(key);
  const view = getActiveMobileView();
  if (view) {
    const panel = view.querySelector('.m-filter-panel');
    if (panel && !panel.classList.contains('hidden')) renderMobileFilterPanel(panel);
  }
  updateMobileFilterIndicator();
  filterActiveMobileList('');
}

function clearMobileFilters() {
  mobileActiveFilters.clear();
  const view = getActiveMobileView();
  if (view) {
    const panel = view.querySelector('.m-filter-panel');
    if (panel) renderMobileFilterPanel(panel);
  }
  updateMobileFilterIndicator();
  filterActiveMobileList('');
}

function updateMobileFilterIndicator() {
  const hasFilter = mobileActiveFilters.size > 0;
  document.querySelectorAll('.m-filter-btn').forEach(btn => {
    btn.classList.toggle('has-filter', hasFilter);
  });
}

function filterActiveMobileList(q) {
  q = (q || '').trim().toLowerCase();
  const view = getActiveMobileView();
  if (!view) return;
  const hasDomainFilter = mobileActiveFilters.size > 0;
  if (view.id === 'stories-view') {
    document.querySelectorAll('#stories-list .feed-row').forEach(row => {
      const matchesCat = !hasDomainFilter || mobileActiveFilters.has(row.dataset.bubble);
      const matchesQuery = !q || (row.textContent || '').toLowerCase().includes(q);
      row.style.display = (matchesCat && matchesQuery) ? '' : 'none';
    });
  } else if (view.id === 'save-view') {
    document.querySelectorAll('#save-feed .feed-row').forEach(row => {
      const matchesCat = !hasDomainFilter || mobileActiveFilters.has(row.dataset.bubble);
      const matchesQuery = !q || (row.textContent || '').toLowerCase().includes(q);
      row.style.display = (matchesCat && matchesQuery) ? '' : 'none';
    });
  } else if (view.id === 'ask-view') {
    document.querySelectorAll('#m-chat-history-list .m-chat-history-item').forEach(item => {
      const matchesQuery = !q || (item.textContent || '').toLowerCase().includes(q);
      item.style.display = matchesQuery ? '' : 'none';
    });
  }
}

function toggleFilterPop(forceState) {
  const pop = document.getElementById('d-filter-pop');
  if (!pop) return;
  const shouldOpen = typeof forceState === 'boolean' ? forceState : !pop.classList.contains('open');
  pop.classList.toggle('open', shouldOpen);
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#d-filter-pop, #d-filter-btn')) toggleFilterPop(false);
});

function renderSourceLinks(sources) {
  if (!sources || !sources.length) return '';
  return sources.map((s, i) => {
    const dot = i < sources.length - 1 ? ' <span class="source-dot">&bull;</span> ' : '';
    return `<span class="source-link" onclick="event.stopPropagation(); showSourceTooltip(event, '${s.system}', '${s.record.replace(/'/g, "\\'")}')">${s.system}</span>${dot}`;
  }).join('');
}

// =========================================================================
function openCardOverlay(bubble, origIdx, opts) {
  const data = insightData[bubble];
  if (!data || !data.cards[origIdx]) return;
  const card = data.cards[origIdx];
  overlayBubble = bubble;
  overlayIndex = origIdx;
  overlayFromSaved = !!(opts && opts.fromSaved);
  overlaySavedIndex = (opts && opts.savedIndex != null) ? opts.savedIndex : null;
  activeDetailPane = 'overlay';

  document.getElementById('overlay-category').textContent = data.title;
  const srcHtml = renderSourceLinks(card.sources);
  document.getElementById('overlay-body').innerHTML = `
    <div class="overlay-headline">${card.headline}</div>
    <div class="overlay-text">${card.body}</div>
    ${srcHtml ? `<div class="overlay-sources">${srcHtml}</div>` : ''}
    <div class="m-card-info-bottom">
      <div class="overlay-meta">Created &middot; ${card.createdAt || '—'}</div>
      ${renderCardDock('overlay')}
    </div>
    <hr class="m-card-divider" />
    <div class="m-card-chat-msgs" id="d-card-chat-msgs-overlay"></div>`;
  cardChatHistory['overlay'] = [];
  cardChatContext['overlay'] = { card, catTitle: data.title, createdAt: card.createdAt };
  cardThreadIds['overlay'] = null;
  const mInput = document.getElementById('m-card-chat-input');
  if (mInput) { mInput.value = ''; mInput.style.height = ''; }

  updateSaveToggleIcon('overlay');
  document.getElementById('card-overlay-backdrop').classList.add('active');
  document.getElementById('card-overlay').classList.add('active');
}

function closeCardOverlay() {
  document.getElementById('card-overlay-backdrop').classList.remove('active');
  document.getElementById('card-overlay').classList.remove('active');
  closeAllSpheres();
  const tooltip = document.getElementById('source-tooltip');
  if (tooltip) { tooltip.classList.remove('visible'); clearTimeout(tooltip._hideT); }
  if (overlayFromSaved) renderSaveFeed();
  if (activeDetailPane === 'overlay') {
    overlayBubble = null; overlayIndex = null; overlayFromSaved = false; overlaySavedIndex = null;
    activeDetailPane = null;
  }
}

function openSavedCard(i) {
  const entry = savedCards[i];
  if (!entry) return;
  openCardOverlay(entry.sourceBubble, entry.sourceIndex, { fromSaved: true, savedIndex: i });
}

// =========================================================================
// DESKTOP DETAIL PANE
// =========================================================================
function openDetail(screen, bubble, origIdx, savedIdx) {
  let card, catTitle, createdAt, fromSaved = false;
  if (screen === 'save') {
    const entry = savedCards[savedIdx];
    if (!entry) return;
    card = getSavedCardData(entry);
    if (!card) return;
    catTitle = insightData[entry.sourceBubble]?.title || entry.sourceBubble;
    createdAt = entry.createdAt;
    bubble = entry.sourceBubble;
    origIdx = entry.sourceIndex;
    fromSaved = true;
    overlaySavedIndex = savedIdx;
  } else {
    const data = insightData[bubble];
    if (!data || !data.cards[origIdx]) return;
    card = data.cards[origIdx];
    catTitle = data.title;
    createdAt = card.createdAt;
  }

  overlayBubble = bubble;
  overlayIndex = origIdx;
  overlayFromSaved = fromSaved;
  activeDetailPane = 'd-' + (screen === 'save' ? 'save' : 'stories');

  const listId = screen === 'save' ? 'd-save-feed' : 'd-stories-list';
  document.querySelectorAll('#' + listId + ' .feed-row').forEach(r => r.classList.remove('d-selected'));
  const rows = document.querySelectorAll('#' + listId + ' .feed-row');
  if (screen === 'save' && rows[savedIdx]) rows[savedIdx].classList.add('d-selected');
  else {
    rows.forEach(r => {
      if (r.dataset.bubble === bubble && r.dataset.index == origIdx) r.classList.add('d-selected');
    });
  }

  const cardEl = document.getElementById(screen === 'save' ? 'd-card-save' : 'd-card-stories');
  const emptyEl = document.getElementById(screen === 'save' ? 'd-empty-save' : 'd-empty-stories');
  const pane = screen === 'save' ? 'd-save' : 'd-stories';
  const srcHtml = renderSourceLinks(card.sources);
  cardEl.innerHTML = `
    <div class="row-badge">${catTitle}</div>
    <div class="d-card-title">${card.headline}</div>
    <div class="d-card-body">${card.body}</div>
    ${srcHtml ? `<div class="overlay-sources d-card-sources">${srcHtml}</div>` : ''}
    <div class="d-card-info-bottom">
      <div class="d-card-meta">Created &middot; ${createdAt || '—'}</div>
      ${renderCardDock(pane)}
    </div>
    <hr class="d-card-divider" />
    <div class="d-card-chat-msgs" id="d-card-chat-msgs-${screen}"></div>`;
  cardChatHistory[screen] = [];
  cardChatContext[screen] = { card, catTitle, createdAt };

function updateSaveToggleIcon(pane) {
  const idMap = { 'overlay': 'tray-save-overlay', 'd-stories': 'tray-save-d-stories', 'd-save': 'tray-save-d-save' };
  const el = document.getElementById(idMap[pane]);
  if (!el) return;
  const isSaved = savedCards.some(c => c.sourceBubble === overlayBubble && c.sourceIndex === overlayIndex);
  el.setAttribute('aria-label', isSaved ? 'Unsave' : 'Save');
  el.innerHTML = isSaved
    ? `<svg viewBox="0 0 24 24"><path d="M7 3h10a2 2 0 0 1 2 2v16l-7-4-7 4V5a2 2 0 0 1 2-2z"/><line x1="9" y1="11" x2="15" y2="11" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M7 3h10a2 2 0 0 1 2 2v16l-7-4-7 4V5a2 2 0 0 1 2-2z"/></svg>`;
}

function saveOrUnsaveFromOverlay() {
  if (overlayBubble == null || overlayIndex == null) return;
  const alreadySaved = savedCards.some(c => c.sourceBubble === overlayBubble && c.sourceIndex === overlayIndex);
  const pane = activeDetailPane;
  if (alreadySaved) {
    // Unsave
    const idx = savedCards.findIndex(c => c.sourceBubble === overlayBubble && c.sourceIndex === overlayIndex);
    closeAllSpheres();
    showSphereToast(pane, 'Returned to Stories');
    setTimeout(() => {
      savedCards.splice(idx, 1);
      if (removedFromStories[overlayBubble]) removedFromStories[overlayBubble].delete(overlayIndex);
      if (pane === 'overlay') closeCardOverlay();
      else closeDetail(pane);
      renderCardFeed();
      renderSaveFeed();
    }, 800);
  } else {
    savedCards.unshift({
      sourceBubble: overlayBubble,
      sourceIndex: overlayIndex,
      createdAt: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
    });
    if (!removedFromStories[overlayBubble]) removedFromStories[overlayBubble] = new Set();
    removedFromStories[overlayBubble].add(overlayIndex);
    closeAllSpheres();
    showSphereToast(pane, 'Saved');
    setTimeout(() => {
      if (pane === 'overlay') closeCardOverlay();
      else closeDetail(pane);
      renderCardFeed();
      renderSaveFeed();
    }, 800);
  }
}

function closeDetail(pane) {
  const screen = pane === 'd-save' ? 'save' : 'stories';
  const cardEl = document.getElementById(screen === 'save' ? 'd-card-save' : 'd-card-stories');
  const emptyEl = document.getElementById(screen === 'save' ? 'd-empty-save' : 'd-empty-stories');
  if (cardEl) { cardEl.classList.remove('d-visible'); cardEl.innerHTML = ''; }
  if (emptyEl) emptyEl.style.display = '';
  const inputBar = document.getElementById('d-card-chat-input-bar-' + screen);
  if (inputBar) inputBar.classList.remove('d-visible');
  overlayBubble = null; overlayIndex = null; overlayFromSaved = false; overlaySavedIndex = null;
  activeDetailPane = null;
}

function showSourceTooltip(e, system, record) {
  e.stopPropagation();
  const tooltip = document.getElementById('source-tooltip');
  if (!tooltip) return;
  tooltip.innerHTML = `In Lens, this would take you directly to <strong>${record}</strong> in <strong>${system}</strong>.`;
  const link = e.target.closest('.source-link') || e.target;
  const linkRect = link.getBoundingClientRect();
  const tooltipWidth = 240;
  let left = linkRect.left + linkRect.width / 2 - tooltipWidth / 2;
  left = Math.max(12, Math.min(left, window.innerWidth - tooltipWidth - 12));
  const top = linkRect.bottom + 8;
  const caretLeft = linkRect.left + linkRect.width / 2 - left;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.style.maxWidth = tooltipWidth + 'px';
  tooltip.style.setProperty('--caret-left', caretLeft + 'px');
  tooltip.classList.add('visible');
  tooltip._fresh = true;
  setTimeout(() => { tooltip._fresh = false; }, 300);
  clearTimeout(tooltip._hideT);
  tooltip._hideT = setTimeout(() => tooltip.classList.remove('visible'), 4000);
}
document.addEventListener('click', () => {
  const tooltip = document.getElementById('source-tooltip');
  if (tooltip && !tooltip._fresh) tooltip.classList.remove('visible');
});
document.addEventListener('scroll', () => {
  const tooltip = document.getElementById('source-tooltip');
  if (tooltip) tooltip.classList.remove('visible');
}, true);

function copyCardLink() {
  if (overlayBubble == null || overlayIndex == null) return;
  const card = insightData[overlayBubble].cards[overlayIndex];
  const fakeId = (overlayBubble + '-' + overlayIndex + '-' + (card?.headline || '').slice(0,6))
    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  const url = 'https://lens.nomocoda.com/c/' + fakeId;
  const pane = activeDetailPane || 'overlay';
  const done = () => { showSphereToast(pane, 'Link copied'); closeAllSpheres(); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
      done();
    });
  } else { done(); }
}

// CHAT
// =========================================================================
const WORKER_URL = 'https://lens-api-proxy.nomocoda.workers.dev';
let chatHistory = [];

function appendMessage(role, text) {
  const isUser = role === 'user';
  const senderName = isUser ? 'Travis' : 'Lens';
  const senderClass = isUser ? 's-user' : 's-lens';
  const rowClass = isUser ? 'user-row' : 'lens-row';
  const avatar = isUser
    ? `<div class="avatar user-av"><span class="user-initial">T</span></div>`
    : `<div class="avatar lens-av"><span class="user-initial">L</span></div>`;
  let sourcesBlock = '';
  if (!isUser && activeChatSources.length) {
    sourcesBlock = `<div class="overlay-sources" style="padding-top:10px;">${renderSourceLinks(activeChatSources)}</div>`;
  }
  const html = `
    <div class="chat-row ${rowClass}">
      <div class="chat-sender-row">
        ${avatar}
        <span class="chat-sender ${senderClass}">${senderName}</span>
      </div>
      <div class="chat-text">${text}${sourcesBlock}</div>
    </div>`;
  const mobile = document.getElementById('chat-messages');
  const desktop = document.getElementById('d-chat-messages');
  if (mobile) { mobile.insertAdjacentHTML('beforeend', html); mobile.scrollTop = mobile.scrollHeight; }
  if (desktop) { desktop.insertAdjacentHTML('beforeend', html); desktop.scrollTop = desktop.scrollHeight; }
}

function showTyping() {
  const html = `
    <div class="chat-row lens-row" id="typing-msg">
      <div class="chat-sender-row">
        <div class="avatar lens-av"><span class="user-initial">L</span></div>
        <span class="chat-sender s-lens">Lens</span>
      </div>
      <div class="chat-text"><span class="typing-indicator"><span></span><span></span><span></span></span></div>
    </div>`;
  const mobile = document.getElementById('chat-messages');
  const desktop = document.getElementById('d-chat-messages');
  if (mobile) { mobile.insertAdjacentHTML('beforeend', html); mobile.scrollTop = mobile.scrollHeight; }
  if (desktop) { desktop.insertAdjacentHTML('beforeend', html.replace('id="typing-msg"', 'id="typing-msg-d"')); desktop.scrollTop = desktop.scrollHeight; }
}

function removeTyping() {
  const m = document.getElementById('typing-msg'); if (m) m.remove();
  const d = document.getElementById('typing-msg-d'); if (d) d.remove();
}

async function sendToLens(userText) {
  appendMessage('user', userText);
  chatHistory.push({ role: 'user', content: userText });
  syncMainThread({ role: 'user', content: userText });
  showTyping();
  try {
    const res = await fetch(WORKER_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText, history: chatHistory.slice(0, -1) }),
    });
    removeTyping();
    if (!res.ok) { appendMessage('lens', 'Something went wrong connecting to Lens. Try again in a moment.'); return; }
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'No response received.';
    chatHistory.push({ role: 'assistant', content: reply });
    syncMainThread({ role: 'assistant', content: reply });
    appendMessage('lens', reply);
  } catch (err) {
    removeTyping();
    appendMessage('lens', 'Connection issue. Check your network and try again.');
  }
}

function syncMainThread(msg) {
  let thread = currentChatThreadId ? chatThreads.find(t => t.id === currentChatThreadId) : null;
  if (!thread) {
    const id = 'chat-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    thread = {
      id,
      title: 'New chat',
      ts: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' }),
      messages: [],
      autoTitled: false,
    };
    chatThreads.unshift(thread);
    currentChatThreadId = id;
  }
  thread.messages.push(msg);
  renderChatHistory();
  if (!thread.autoTitled && thread.messages.some(m => m.role === 'assistant') && thread.messages.some(m => m.role === 'user')) {
    thread.autoTitled = true;
    generateThreadTitle(thread);
  }
}

async function generateThreadTitle(thread) {
  const convo = thread.messages.slice(0, 4).map(m => `${m.role === 'user' ? 'User' : 'Lens'}: ${m.content}`).join('\n\n');
  const prompt = `Write a 3-6 word title summarizing the topic of this conversation. Plain text only, no quotes, no punctuation at the end.\n\n${convo}`;
  try {
    const res = await fetch(WORKER_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: prompt, history: [] }),
    });
    if (!res.ok) return;
    const data = await res.json();
    const raw = (data.content?.[0]?.text || '').trim().replace(/^["']|["']$/g, '').replace(/[.?!]+$/, '');
    if (raw) {
      thread.title = raw.slice(0, 60);
      renderChatHistory();
    }
  } catch (_) {}
}

function autoGrowInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  el.style.overflow = el.scrollHeight > 120 ? 'auto' : 'hidden';
}

function sendMessage(fromDesktop) {
  const inputId = fromDesktop ? 'd-chat-input' : 'chat-input';
  const input = document.getElementById(inputId);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '';
  input.style.overflow = 'hidden';
  // Sync other input if both present
  const other = document.getElementById(fromDesktop ? 'chat-input' : 'd-chat-input');
  if (other) { other.value = ''; other.style.height = ''; }
  if (!fromDesktop) showMobileThreadView();
  sendToLens(text);
}

async function sendCardMessage(screen) {
  const inputId = screen === 'overlay' ? 'm-card-chat-input' : 'd-card-chat-input-' + screen;
  const input = document.getElementById(inputId);
  if (!input) return;
  const text = input.value.trim();

  appendCardMsg(screen, 'user', text);
  cardChatHistory[screen] = cardChatHistory[screen] || [];
  cardChatHistory[screen].push({ role: 'user', content: text });
  syncCardThread(screen, { role: 'user', content: text });

  showCardTyping(screen);
  try {
    const ctx = cardChatContext[screen];
    const priorHistory = ctx
      ? [
          { role: 'user', content: `[Card context] ${ctx.catTitle}\nHeadline: ${ctx.card.headline}\nBody: ${ctx.card.body}` },
          { role: 'assistant', content: `Got it. Ask me anything about this ${ctx.catTitle.toLowerCase()} story.` },
          ...cardChatHistory[screen].slice(0, -1),
        ]
      : cardChatHistory[screen].slice(0, -1);
    const res = await fetch(WORKER_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: priorHistory }),
    });
    removeCardTyping(screen);
    if (!res.ok) { appendCardMsg(screen, 'lens', 'Something went wrong. Try again in a moment.'); return; }
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'No response received.';
    cardChatHistory[screen].push({ role: 'assistant', content: reply });
    syncCardThread(screen, { role: 'assistant', content: reply });
    appendCardMsg(screen, 'lens', reply);
  } catch (err) {
    removeCardTyping(screen);
    appendCardMsg(screen, 'lens', 'Connection issue. Check your network and try again.');
  }
}

  }
  if (thread.ts) {
    const dateHtml = `<div class="chat-date-divider">${thread.ts}</div>`;
    if (desktop) desktop.innerHTML += dateHtml;
    if (mobile) mobile.innerHTML += dateHtml;
  }
  thread.messages.forEach(m => {
    chatHistory.push(m);
    appendMessage(m.role === 'assistant' ? 'lens' : 'user', m.content);
  });
  renderChatHistory();
  showMobileThreadView();
}

function renderChatCardRef(ref) {
  const srcHtml = renderSourceLinks(ref.card.sources);
  return `
    <div class="chat-card-ref">
      <div class="row-badge">${ref.catTitle}</div>
      <div class="d-card-title">${ref.card.headline}</div>
      <div class="d-card-body">${ref.card.body}</div>
      ${srcHtml ? `<div class="overlay-sources d-card-sources">${srcHtml}</div>` : ''}
      <div class="d-card-meta">Created &middot; ${ref.createdAt || '—'}</div>
    </div>`;
}

function newChatSession() {
  currentChatThreadId = null;
  chatHistory = [];
  activeChatSources = [];
  const desktop = document.getElementById('d-chat-messages');
  if (desktop) desktop.innerHTML = '';
  const mobile = document.getElementById('chat-messages');
  if (mobile) mobile.innerHTML = '';
  renderChatHistory();
  const input = document.getElementById('d-chat-input');
  if (input) { input.value = ''; input.style.height = ''; input.focus(); }
}

function mobileNewChat() {
  currentChatThreadId = null;
  chatHistory = [];
  activeChatSources = [];
  const mobile = document.getElementById('chat-messages');
  if (mobile) mobile.innerHTML = '';
  renderChatHistory();
  showMobileThreadView();
  const input = document.getElementById('chat-input');
  if (input) { input.value = ''; input.style.height = ''; input.focus(); }
}

function syncCardThread(screen, msg) {
  const ctx = cardChatContext[screen];
  if (!ctx) return;
  let threadId = cardThreadIds[screen];
  let thread = threadId ? chatThreads.find(t => t.id === threadId) : null;
  if (!thread) {
    threadId = 'card-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    thread = {
      id: threadId,
      title: ctx.card.headline,
      ts: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' }),
      messages: [],
      cardRef: { card: ctx.card, catTitle: ctx.catTitle, createdAt: ctx.createdAt },
    };
    chatThreads.unshift(thread);
    cardThreadIds[screen] = threadId;
  }
  thread.messages.push(msg);
  renderChatHistory();
}

// =========================================================================
// VOICE INPUT (Web Speech)
// =========================================================================
let isRecording = false;
let recognition = null;
let activeMicBtn = null;

function initSpeechRecognition(inputId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const rec = new SpeechRecognition();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'en-US';
  rec.onresult = (e) => {
    const input = document.getElementById(inputId);
    if (!input) return;
    let transcript = '';
    for (let i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
    input.value = transcript;
  };
  rec.onend = () => {
    isRecording = false;
    if (activeMicBtn) activeMicBtn.classList.remove('recording');
    const input = document.getElementById(inputId);
    if (input && input.value.trim()) input.focus();
  };
  rec.onerror = () => {
    isRecording = false;
    if (activeMicBtn) activeMicBtn.classList.remove('recording');
  };
  return rec;
}

function toggleMic(btnId, inputId) {
  btnId = btnId || 'mic-btn';
  inputId = inputId || 'chat-input';
  const btn = document.getElementById(btnId);
  if (isRecording) {
    if (recognition) recognition.stop();
    isRecording = false;
    if (activeMicBtn) activeMicBtn.classList.remove('recording');
  } else {
    recognition = initSpeechRecognition(inputId);
    if (!recognition) return;
    recognition.start();
    isRecording = true;
    activeMicBtn = btn;
    btn.classList.add('recording');
  }
}
