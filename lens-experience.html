<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lens — NomoCoda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  line-height: 1.8;
  background: #FFFFFF;
  color: #1a1a1a;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  width: 100vw;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}

/* Close button */
#close-btn {
  position: fixed;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  font-size: 18px;
  color: #999;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  transition: color 0.2s;
}
#close-btn:hover { color: #333; }

/* Chat area */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 56px 16px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

.msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }

.msg-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #AFA9EC;
  font-weight: 600;
  padding: 0 4px;
}
.msg-label.user-label { text-align: right; }

.msg-bubble {
  max-width: 85%;
  padding: 10px 14px;
  background: #FFFFFF;
  border: 0.5px solid #CECBF6;
  font-size: 15px;
  line-height: 1.8;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg-bubble.lens { border-radius: 3px 14px 14px 14px; align-self: flex-start; }
.msg-bubble.user { border-radius: 14px 14px 3px 14px; align-self: flex-end; }

/* Thinking indicator */
.thinking-dots {
  display: flex;
  gap: 4px;
  padding: 12px 14px;
  align-self: flex-start;
}
.thinking-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #CECBF6;
  animation: dotPulse 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* Bottom bar */
#bottom-bar {
  height: 15vh;
  min-height: 100px;
  max-height: 140px;
  display: flex;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  touch-action: pan-y;
}

#ask-panel, #explore-panel {
  display: flex;
  align-items: center;
  justify-content: center;
  transition: flex 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

#ask-panel { background: #4A90D9; flex: 1; }
#explore-panel { background: #4CAF50; flex: 1; }

/* State classes on #bottom-bar */
#bottom-bar.state-ask #ask-panel { flex: 75; }
#bottom-bar.state-ask #explore-panel { flex: 25; }
#bottom-bar.state-balanced #ask-panel { flex: 50; }
#bottom-bar.state-balanced #explore-panel { flex: 50; }
#bottom-bar.state-explore #ask-panel { flex: 25; }
#bottom-bar.state-explore #explore-panel { flex: 75; }

/* Active 85/15 override */
#bottom-bar.state-ask-active #ask-panel { flex: 85; }
#bottom-bar.state-ask-active #explore-panel { flex: 15; }
#bottom-bar.state-explore-active #ask-panel { flex: 15; }
#bottom-bar.state-explore-active #explore-panel { flex: 85; }

/* Panel content */
.panel-content {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  width: 100%;
  height: 100%;
  pointer-events: none;
  user-select: none;
}

.panel-icon {
  font-size: 18px;
  flex-shrink: 0;
}

.panel-label {
  white-space: nowrap;
  overflow: hidden;
  transition: opacity 0.3s;
}

/* Hide labels/icons depending on state */
#bottom-bar.state-ask-active #ask-panel .panel-label,
#bottom-bar.state-ask-active #ask-panel .panel-icon { opacity: 0; }
#bottom-bar.state-explore-active #explore-panel .panel-label,
#bottom-bar.state-explore-active #explore-panel .panel-icon { opacity: 0; }

#bottom-bar.state-ask-active #explore-panel .panel-label,
#bottom-bar.state-ask-active #explore-panel .panel-icon { opacity: 1; }
#bottom-bar.state-explore-active #ask-panel .panel-label,
#bottom-bar.state-explore-active #ask-panel .panel-icon { opacity: 1; }

/* Input area (overlays ask panel when active) */
#input-area {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 2;
}
#bottom-bar.state-ask-active #input-area,
#bottom-bar.state-ask #input-area {
  opacity: 1;
  pointer-events: all;
}

#msg-input {
  flex: 1;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  padding: 10px 14px;
  border-radius: 10px;
  outline: none;
  resize: none;
  max-height: 80px;
  line-height: 1.4;
}
#msg-input::placeholder { color: rgba(255,255,255,0.6); }

#send-btn {
  width: 40px; height: 40px;
  border: none;
  background: rgba(255,255,255,0.25);
  color: white;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
#send-btn:hover { background: rgba(255,255,255,0.35); }

/* Explore question overlay */
#explore-area {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 2;
}
#bottom-bar.state-explore-active #explore-area,
#bottom-bar.state-explore #explore-area {
  opacity: 1;
  pointer-events: all;
}

#explore-question {
  color: white;
  font-size: 14px;
  line-height: 1.5;
  text-align: center;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: background 0.2s;
  user-select: none;
}
#explore-question:hover { background: rgba(255,255,255,0.1); }

#explore-hint {
  position: absolute;
  bottom: 6px;
  color: rgba(255,255,255,0.5);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Button press animation */
.btn-press {
  animation: btnCompress 80ms ease-in forwards;
}
.btn-release {
  animation: btnRelease 700ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes btnCompress {
  to { transform: scaleY(0.92); }
}
@keyframes btnRelease {
  from { transform: scaleY(0.92); }
  to { transform: scaleY(1); }
}

/* Scrollbar */
#chat-area::-webkit-scrollbar { width: 4px; }
#chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* Markdown-like formatting in messages */
.msg-bubble strong { font-weight: 600; }
.msg-bubble em { font-style: italic; }
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 4px 0; }
.msg-bubble li { margin: 2px 0; }
.msg-bubble p { margin: 4px 0; }
.msg-bubble p:first-child { margin-top: 0; }
.msg-bubble p:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<div id="app">
  <button id="close-btn" aria-label="Close">&times;</button>

  <div id="chat-area">
    <div class="msg-group">
      <div class="msg-label">Lens</div>
      <div class="msg-bubble lens">Good morning. What should we tackle today?</div>
    </div>
  </div>

  <div id="bottom-bar" class="state-balanced">
    <div id="ask-panel">
      <div class="panel-content">
        <span class="panel-icon">&#9998;</span>
        <span class="panel-label">Ask</span>
      </div>
      <div id="input-area">
        <textarea id="msg-input" rows="1" placeholder="Ask Lens anything..."></textarea>
        <button id="send-btn" aria-label="Send">&#8593;</button>
      </div>
    </div>
    <div id="explore-panel">
      <div class="panel-content">
        <span class="panel-icon">&#10024;</span>
        <span class="panel-label">Explore</span>
      </div>
      <div id="explore-area">
        <div id="explore-question"></div>
        <div id="explore-hint">Swipe up for next &middot; Tap to ask</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───
const PROXY_URL = 'https://lens-api-proxy.nomocoda.workers.dev';

const SYSTEM_PROMPT = `You are Lens, the strategic intelligence layer for Acme Industrial — a 300-person mid-market manufacturer in Columbus, Ohio. Custom precision components for automotive, aerospace, and industrial equipment. Complete visibility across all connected systems.

FINANCIALS: $38M revenue, Q1 tracking 3% below Q2 target of $9.8M. Gross margin 34%. Steel costs up 11% since Jan. Overdue: Keller Automotive $214K (45+ days), Midwest Fabricators $87K. CapEx: $1.2M approved for Facility 2 press upgrade, pending contractor.
CLIENTS: 42 active contracts. HIGH RISK — Keller Automotive: $4.1M, renewal 67 days, engagement dropping, 2 QBRs missed. HEALTHY — Orion Aerospace: $6.8M, 2-year extension just signed. WATCH — Hartwell Equipment: $1.1M new client, 3 quality concerns in 60 days. PIPELINE — Summit Defense $3.2M final negotiations (wants July 15 vs Aug); Meridian Auto Parts $2.1M went quiet 3 weeks ago.
PRODUCTION: Facility 1 Columbus 94% capacity on schedule. Facility 2 Cleveland 78% — press line 3 calibration issue causing 6-8% yield loss on aerospace parts, Dave Kowalski flagged 3x. Facility 3 Detroit 61% ramping for Hartwell. OTD 91.3% vs 95% target.
VENDORS: Midwest Steel renewal 45 days, wants +8% increase. Alternative: Great Lakes Alloys qualified not contracted. RISK: Precision Coatings Inc sole-source aerospace supplier, late 2 of last 4 deliveries, no alternative — Orion contract depends on this. Freight rates up 7%.
PEOPLE: Director of Quality Priya Nair resigned, last day April 15 — was AS9100 audit lead, recert June 14, no replacement search started. Plant Mgr F2 Dave Kowalski waiting on maintenance budget. Engineering fully allocated through Q2 on Summit Defense pre-production. Open: 4 CNC operators, 1 Quality Engineer.
MARKET: Manufacturing World conference May 12 Chicago — major defense and aerospace procurement teams attending, Summit Defense rumored present. Steel tariffs under Congressional review — potential 15% increase. Competitor Apex Precision expanding into aerospace. Regional freight consortium forming — members locking 3-year rates 12% below spot market, deadline April 30.
SLACK: Dave Kowalski "Third time flagging press line 3 — need budget decision this week or we'll miss Orion window." Finance "Keller payment outstanding — flag to CEO?" Sales "Summit Defense asking for accelerated timeline."

You ARE Lens. Never say you are Claude or an AI. Be concise, synthesized, actionable. Reference specific data naturally. When restricted access applies, acknowledge what you can see, note the gap, offer to facilitate. Remember everything from this conversation.

Tone: Lead with optimism and opportunity, not just risk. For every challenge you surface, look for the corresponding opportunity or bright spot. Celebrate wins proactively. Balance is key: informed and clear-eyed, but always forward-leaning and energizing.`;

const EXPLORE_QUESTIONS = [
  "Are any projects at risk of missing their milestones this week?",
  "If we switch vendors on our primary supplier contract, does the ops team have capacity to manage the transition?",
  "We have a booth at Manufacturing World in May — what's our current readiness across sales, ops, and product?",
  "What decisions are awaiting a response from me right now?",
  "Which clients show signs of reduced engagement and could be good candidates for AI alternatives?",
  "Which vendor contracts or renewals are coming up in the next 90 days?",
  "What market shifts could affect our operations in the next 2 quarters?",
  "What's the status of our top 3 active client engagements this week?",
  "Where does our internal AI compliance workflow stand, and are we on track for the next audit cycle?"
];

// ─── STATE ───
let conversationHistory = [];
let currentExploreIdx = 0;
let barState = 'balanced'; // 'ask' | 'balanced' | 'explore'
let isWaiting = false;

// ─── DOM ───
const chatArea = document.getElementById('chat-area');
const bottomBar = document.getElementById('bottom-bar');
const askPanel = document.getElementById('ask-panel');
const explorePanel = document.getElementById('explore-panel');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const exploreQuestion = document.getElementById('explore-question');
const closeBtn = document.getElementById('close-btn');

// ─── INIT ───
exploreQuestion.textContent = EXPLORE_QUESTIONS[currentExploreIdx];

// ─── CLOSE ───
closeBtn.addEventListener('click', () => {
  if (window.opener) window.close();
  else if (document.referrer) window.location.href = document.referrer;
  else window.close();
});

// ─── CHAT ───
function addMessage(role, text) {
  const group = document.createElement('div');
  group.className = 'msg-group';

  const label = document.createElement('div');
  label.className = 'msg-label' + (role === 'user' ? ' user-label' : '');
  label.textContent = role === 'user' ? 'You' : 'Lens';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + (role === 'user' ? 'user' : 'lens');
  bubble.innerHTML = formatText(text);

  group.appendChild(label);
  group.appendChild(bubble);
  chatArea.appendChild(group);
  scrollToBottom();
}

function formatText(text) {
  // Basic markdown-like formatting
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.+?<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs
  html = html.split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<ul>') || p.startsWith('<ol>')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  return html || text;
}

function showThinking() {
  const el = document.createElement('div');
  el.className = 'msg-group';
  el.id = 'thinking';
  el.innerHTML = '<div class="msg-label">Lens</div><div class="thinking-dots"><span></span><span></span><span></span></div>';
  chatArea.appendChild(el);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

async function sendMessage(text) {
  if (!text.trim() || isWaiting) return;
  isWaiting = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  msgInput.value = '';
  autoResizeInput();
  showThinking();

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: conversationHistory,
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024
      })
    });

    if (!res.ok) throw new Error('API error: ' + res.status);

    const data = await res.json();
    const reply = data.content?.[0]?.text || data.text || 'I couldn\'t process that. Let me try again.';

    removeThinking();
    addMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeThinking();
    addMessage('assistant', 'Connection issue — please try again in a moment.');
    console.error('API Error:', err);
  }

  isWaiting = false;

  // Auto-return to balanced after response
  setTimeout(() => setBarState('balanced'), 600);
}

// ─── INPUT ───
sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(msgInput.value);
  }
});

function autoResizeInput() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 80) + 'px';
}
msgInput.addEventListener('input', autoResizeInput);

// ─── EXPLORE ───
exploreQuestion.addEventListener('click', () => {
  const q = EXPLORE_QUESTIONS[currentExploreIdx];
  setBarState('ask-active');
  msgInput.value = q;
  autoResizeInput();
  sendMessage(q);
});

// Explore vertical swipe (cycle questions)
let exploreTouchStartY = 0;
const exploreArea = document.getElementById('explore-area');
exploreArea.addEventListener('touchstart', (e) => {
  exploreTouchStartY = e.touches[0].clientY;
}, { passive: true });
exploreArea.addEventListener('touchend', (e) => {
  const dy = exploreTouchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 30) {
    if (dy > 0) {
      // Swipe up — next question
      currentExploreIdx = (currentExploreIdx + 1) % EXPLORE_QUESTIONS.length;
    } else {
      // Swipe down — prev question
      currentExploreIdx = (currentExploreIdx - 1 + EXPLORE_QUESTIONS.length) % EXPLORE_QUESTIONS.length;
    }
    exploreQuestion.style.opacity = '0';
    setTimeout(() => {
      exploreQuestion.textContent = EXPLORE_QUESTIONS[currentExploreIdx];
      exploreQuestion.style.opacity = '1';
    }, 150);
  }
});

// ─── BOTTOM BAR STATE ───
function setBarState(state) {
  barState = state;
  bottomBar.className = 'state-' + state;

  if (state === 'ask' || state === 'ask-active') {
    setTimeout(() => msgInput.focus(), 400);
  }
}

// Panel click handlers (desktop + mobile tap on inactive handle)
askPanel.addEventListener('click', (e) => {
  if (e.target === msgInput || e.target === sendBtn) return;
  if (barState === 'explore' || barState === 'explore-active' || barState === 'balanced') {
    setBarState('ask-active');
  }
});

explorePanel.addEventListener('click', (e) => {
  if (e.target === exploreQuestion || exploreArea.contains(e.target)) return;
  if (barState === 'ask' || barState === 'ask-active' || barState === 'balanced') {
    setBarState('explore-active');
  }
});

// ─── SWIPE GESTURE (horizontal on bottom bar) ───
let touchStartX = 0;
let touchStartY = 0;
let isSwiping = false;

bottomBar.addEventListener('touchstart', (e) => {
  // Don't capture if touching input or explore area directly
  if (e.target === msgInput || e.target === sendBtn) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = false;
}, { passive: true });

bottomBar.addEventListener('touchmove', (e) => {
  if (e.target === msgInput) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 15) {
    isSwiping = true;
  }
}, { passive: true });

bottomBar.addEventListener('touchend', (e) => {
  if (!isSwiping || e.target === msgInput) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) < 40) return;

  const states = ['ask-active', 'ask', 'balanced', 'explore', 'explore-active'];
  let idx = states.indexOf(barState);
  if (idx === -1) idx = 2; // balanced

  if (dx < 0) {
    // Swipe left → toward explore
    idx = Math.min(idx + 1, states.length - 1);
  } else {
    // Swipe right → toward ask
    idx = Math.max(idx - 1, 0);
  }
  setBarState(states[idx]);
});

// ─── BUTTON PRESS ANIMATION ───
function addPressAnimation(el) {
  el.addEventListener('pointerdown', () => {
    el.classList.remove('btn-release');
    el.classList.add('btn-press');
  });
  el.addEventListener('pointerup', () => {
    el.classList.remove('btn-press');
    el.classList.add('btn-release');
  });
  el.addEventListener('pointerleave', () => {
    el.classList.remove('btn-press');
    el.classList.add('btn-release');
  });
}
addPressAnimation(askPanel);
addPressAnimation(explorePanel);

// ─── TEXTAREA AUTO-GROW & KEYBOARD HANDLING ───
// On mobile, adjust for virtual keyboard
if (/Mobi|Android/i.test(navigator.userAgent)) {
  window.visualViewport?.addEventListener('resize', () => {
    document.getElementById('app').style.height = window.visualViewport.height + 'px';
  });
}
</script>
</body>
</html>
