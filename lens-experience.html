<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lens — NomoCoda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  background: #f7f7f8;
  color: #1a1a1a;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

#app {
  display: flex;
  flex-direction: column;
  height: var(--app-height, 100dvh);
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #ffffff;
}

@media (min-width: 540px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f0f1;
  }
  #app {
    height: min(92vh, 820px) !important;
    position: relative !important;
    top: auto !important;
    border-radius: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.03);
    overflow: hidden;
  }
}

/* Close */
#close-btn {
  position: absolute;
  top: 14px; right: 14px;
  width: 30px; height: 30px;
  border: none;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  font-size: 16px;
  color: #bbb;
  cursor: pointer;
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#close-btn:hover { color: #6C5CE7; background: #f5f3ff; }

/* Chat */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 52px 16px 8px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}

.msg-group {
  display: flex; flex-direction: column; gap: 3px; margin-bottom: 14px;
  animation: msgFadeIn 0.3s ease-out;
}
@keyframes msgFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-label {
  font-size: 10px; letter-spacing: 0.5px;
  color: #999; font-weight: 600; padding: 0 6px;
}
.msg-label.user-label { text-align: right; }

.msg-bubble {
  max-width: 85%; padding: 12px 16px;
  font-size: 15px; line-height: 1.6;
  word-wrap: break-word; white-space: pre-wrap;
}
.msg-bubble.lens {
  border-radius: 4px 18px 18px 18px;
  align-self: flex-start;
  background: #f8f8f9;
  color: #1a1a1a;
}
.msg-bubble.user {
  border-radius: 18px 18px 4px 18px;
  align-self: flex-end;
  background: #6C5CE7;
  color: #ffffff;
}

/* Thinking */
.thinking-dots { display: flex; gap: 5px; padding: 14px 16px; align-self: flex-start; }
.thinking-dots span {
  width: 7px; height: 7px; border-radius: 50%; background: #C4BFEE;
  animation: dotPulse 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ─── Bottom section ─── */
#bottom-section {
  flex-shrink: 0;
  background: #fff;
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  z-index: 10;
}

/* ─── Action bar ─── */
#action-bar {
  display: flex;
  gap: 10px;
  align-items: stretch;
  min-height: 48px;
}

.action-btn {
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: white;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
  white-space: nowrap;
  position: relative;
}
.action-btn:active { transform: scale(0.95); }

.action-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.action-btn .btn-label { transition: opacity 0.25s, width 0.4s; }

#ask-action {
  background: #6C5CE7;
  border-radius: 24px;
  box-shadow: 0 2px 12px rgba(108, 92, 231, 0.3);
}
#ask-action:hover { background: #5a4bd6; }

#explore-action {
  background: #8B7CF7;
  border-radius: 24px;
  box-shadow: 0 2px 12px rgba(139, 124, 247, 0.25);
}
#explore-action:hover { background: #7a6be6; }

/* State: balanced */
#action-bar.state-balanced .action-btn {
  flex: 1;
  padding: 0 20px;
  border-radius: 24px;
  height: 48px;
}

/* State: ask active */
#action-bar.state-ask #ask-action {
  flex: 1;
  padding: 0 20px;
  border-radius: 24px;
  height: 48px;
}
#action-bar.state-ask #explore-action {
  flex: 0 0 48px;
  width: 48px;
  height: 48px;
  padding: 0;
  border-radius: 50%;
}
#action-bar.state-ask #explore-action .btn-label {
  opacity: 0; width: 0; overflow: hidden;
}

/* State: explore active */
#action-bar.state-explore #explore-action {
  flex: 1;
  padding: 0 20px;
  border-radius: 24px;
  height: 48px;
}
#action-bar.state-explore #ask-action {
  flex: 0 0 48px;
  width: 48px;
  height: 48px;
  padding: 0;
  border-radius: 50%;
}
#action-bar.state-explore #ask-action .btn-label {
  opacity: 0; width: 0; overflow: hidden;
}

/* ─── Input bar ─── */
#input-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1),
              opacity 0.3s ease,
              margin 0.4s;
  margin-top: 0;
}
#input-bar.visible {
  max-height: 120px;
  opacity: 1;
  margin-top: 0;
}

#msg-input {
  flex: 1;
  border: 1.5px solid #e5e5e7;
  background: #fafafa;
  color: #1a1a1a;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  padding: 10px 16px;
  border-radius: 22px;
  outline: none;
  resize: none;
  max-height: 100px;
  min-height: 44px;
  line-height: 1.4;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#msg-input:focus {
  border-color: #C4BFEE;
  box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.08);
}
#msg-input::placeholder { color: #c0c0c4; }

#send-btn {
  width: 44px; height: 44px;
  border: none;
  background: #6C5CE7;
  color: white;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(108, 92, 231, 0.25);
}
#send-btn:hover { background: #5a4bd6; }
#send-btn:active { transform: scale(0.92); }
#send-btn:disabled { background: #d4d0f0; box-shadow: none; cursor: default; }
#send-btn svg { width: 18px; height: 18px; }

/* ─── Explore carousel ─── */
#explore-strip {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1),
              opacity 0.3s ease;
  position: relative;
}
#explore-strip.visible {
  max-height: 160px;
  opacity: 1;
}

#explore-carousel {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  height: 130px;
  overflow: hidden;
  touch-action: pan-y;
}

.explore-item {
  position: absolute;
  left: 0; right: 0;
  text-align: center;
  font-size: 14px;
  line-height: 1.5;
  color: #5a4eb0;
  padding: 0 20px;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
              opacity 0.4s ease;
  user-select: none;
}
.explore-item.center {
  top: 50%;
  transform: translateY(-50%);
  opacity: 1;
}
.explore-item.above {
  top: 50%;
  transform: translateY(calc(-50% - 52px));
  opacity: 0.35;
  font-size: 13px;
  color: #b0a8d8;
}
.explore-item.below {
  top: 50%;
  transform: translateY(calc(-50% + 52px));
  opacity: 0.35;
  font-size: 13px;
  color: #b0a8d8;
}
.explore-item.hidden-above {
  top: 50%;
  transform: translateY(calc(-50% - 96px));
  opacity: 0;
}
.explore-item.hidden-below {
  top: 50%;
  transform: translateY(calc(-50% + 96px));
  opacity: 0;
}

/* Soft fade at top and bottom edges */
#explore-carousel::before,
#explore-carousel::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 16px;
  pointer-events: none;
  z-index: 1;
}
#explore-carousel::before {
  top: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
}
#explore-carousel::after {
  bottom: 0;
  background: linear-gradient(to top, rgba(255,255,255,0.8), rgba(255,255,255,0));
}

/* Scrollbar */
#chat-area::-webkit-scrollbar { width: 3px; }
#chat-area::-webkit-scrollbar-thumb { background: #e8e8ea; border-radius: 2px; }

/* Message formatting */
.msg-bubble strong { font-weight: 600; }
.msg-bubble em { font-style: italic; }
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 4px 0; }
.msg-bubble li { margin: 2px 0; }
.msg-bubble p { margin: 4px 0; }
.msg-bubble p:first-child { margin-top: 0; }
.msg-bubble p:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<div id="app">
  <button id="close-btn" aria-label="Close">&times;</button>

  <div id="chat-area">
    <div class="msg-group">
      <div class="msg-label">Lens</div>
      <div class="msg-bubble lens">Good morning. What should we tackle today?</div>
    </div>
  </div>

  <div id="bottom-section">
    <!-- Explore carousel -->
    <div id="explore-strip">
      <div id="explore-carousel"></div>
    </div>

    <!-- Input bar -->
    <div id="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Ask Lens anything..."></textarea>
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>

    <!-- Action buttons -->
    <div id="action-bar" class="state-balanced">
      <button id="ask-action" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="btn-label">Ask</span>
      </button>
      <button id="explore-action" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span class="btn-label">Explore</span>
      </button>
    </div>
  </div>
</div>

<script>
const PROXY_URL = 'https://lens-api-proxy.nomocoda.workers.dev';

const SYSTEM_PROMPT = `You are Lens, the strategic intelligence layer for Acme Industrial — a 300-person mid-market manufacturer in Columbus, Ohio. Custom precision components for automotive, aerospace, and industrial equipment. Complete visibility across all connected systems.

FINANCIALS: $38M revenue, Q1 tracking 3% below Q2 target of $9.8M. Gross margin 34%. Steel costs up 11% since Jan. Overdue: Keller Automotive $214K (45+ days), Midwest Fabricators $87K. CapEx: $1.2M approved for Facility 2 press upgrade, pending contractor.
CLIENTS: 42 active contracts. HIGH RISK — Keller Automotive: $4.1M, renewal 67 days, engagement dropping, 2 QBRs missed. HEALTHY — Orion Aerospace: $6.8M, 2-year extension just signed. WATCH — Hartwell Equipment: $1.1M new client, 3 quality concerns in 60 days. PIPELINE — Summit Defense $3.2M final negotiations (wants July 15 vs Aug); Meridian Auto Parts $2.1M went quiet 3 weeks ago.
PRODUCTION: Facility 1 Columbus 94% capacity on schedule. Facility 2 Cleveland 78% — press line 3 calibration issue causing 6-8% yield loss on aerospace parts, Dave Kowalski flagged 3x. Facility 3 Detroit 61% ramping for Hartwell. OTD 91.3% vs 95% target.
VENDORS: Midwest Steel renewal 45 days, wants +8% increase. Alternative: Great Lakes Alloys qualified not contracted. RISK: Precision Coatings Inc sole-source aerospace supplier, late 2 of last 4 deliveries, no alternative — Orion contract depends on this. Freight rates up 7%.
PEOPLE: Director of Quality Priya Nair resigned, last day April 15 — was AS9100 audit lead, recert June 14, no replacement search started. Plant Mgr F2 Dave Kowalski waiting on maintenance budget. Engineering fully allocated through Q2 on Summit Defense pre-production. Open: 4 CNC operators, 1 Quality Engineer.
MARKET: Manufacturing World conference May 12 Chicago — major defense and aerospace procurement teams attending, Summit Defense rumored present. Steel tariffs under Congressional review — potential 15% increase. Competitor Apex Precision expanding into aerospace. Regional freight consortium forming — members locking 3-year rates 12% below spot market, deadline April 30.
SLACK: Dave Kowalski "Third time flagging press line 3 — need budget decision this week or we'll miss Orion window." Finance "Keller payment outstanding — flag to CEO?" Sales "Summit Defense asking for accelerated timeline."

You ARE Lens. Never say you are Claude or an AI. Be concise, synthesized, actionable. Reference specific data naturally. When restricted access applies, acknowledge what you can see, note the gap, offer to facilitate. Remember everything from this conversation.

Tone: Lead with optimism and opportunity, not just risk. For every challenge you surface, look for the corresponding opportunity or bright spot. Celebrate wins proactively. Balance is key: informed and clear-eyed, but always forward-leaning and energizing.`;

const EXPLORE_QUESTIONS = [
  "Are any projects at risk of missing their milestones this week?",
  "If we switch vendors on our primary supplier contract, does the ops team have capacity to manage the transition?",
  "We have a booth at Manufacturing World in May — what's our current readiness across sales, ops, and product?",
  "What decisions are awaiting a response from me right now?",
  "Which clients show signs of reduced engagement and could be good candidates for AI alternatives?",
  "Which vendor contracts or renewals are coming up in the next 90 days?",
  "What market shifts could affect our operations in the next 2 quarters?",
  "What's the status of our top 3 active client engagements this week?",
  "Where does our internal AI compliance workflow stand, and are we on track for the next audit cycle?"
];

let conversationHistory = [];
let currentExploreIdx = 0;
let currentMode = 'balanced';
let isWaiting = false;
let isSnapping = false;

const chatArea = document.getElementById('chat-area');
const actionBar = document.getElementById('action-bar');
const askAction = document.getElementById('ask-action');
const exploreAction = document.getElementById('explore-action');
const inputBar = document.getElementById('input-bar');
const exploreStrip = document.getElementById('explore-strip');
const carousel = document.getElementById('explore-carousel');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

// Build carousel items
function renderCarousel() {
  carousel.innerHTML = '';
  const total = EXPLORE_QUESTIONS.length;
  const prevIdx = (currentExploreIdx - 1 + total) % total;
  const nextIdx = (currentExploreIdx + 1) % total;

  const items = [
    { idx: prevIdx, pos: 'above' },
    { idx: currentExploreIdx, pos: 'center' },
    { idx: nextIdx, pos: 'below' }
  ];

  items.forEach(({ idx, pos }) => {
    const el = document.createElement('div');
    el.className = 'explore-item ' + pos;
    el.textContent = EXPLORE_QUESTIONS[idx];
    el.dataset.idx = idx;
    if (pos === 'center') {
      el.addEventListener('click', () => {
        const q = EXPLORE_QUESTIONS[idx];
        setMode('ask');
        setTimeout(() => sendMessage(q), 100);
      });
    }
    carousel.appendChild(el);
  });
}

function snapTo(newIdx, direction) {
  if (isSnapping) return;
  isSnapping = true;

  const total = EXPLORE_QUESTIONS.length;
  const oldItems = carousel.querySelectorAll('.explore-item');

  // Move existing items
  oldItems.forEach(item => {
    if (item.classList.contains('center')) {
      item.classList.remove('center');
      item.classList.add(direction === 'up' ? 'hidden-above' : 'hidden-below');
    } else if (item.classList.contains('above')) {
      item.classList.remove('above');
      item.classList.add(direction === 'up' ? 'hidden-above' : 'center');
    } else if (item.classList.contains('below')) {
      item.classList.remove('below');
      item.classList.add(direction === 'up' ? 'center' : 'hidden-below');
    }
  });

  // Add new edge item
  const newEdgeIdx = direction === 'up'
    ? (newIdx + 1) % total
    : (newIdx - 1 + total) % total;

  const newEl = document.createElement('div');
  newEl.className = 'explore-item ' + (direction === 'up' ? 'hidden-below' : 'hidden-above');
  newEl.textContent = EXPLORE_QUESTIONS[newEdgeIdx];
  newEl.dataset.idx = newEdgeIdx;
  carousel.appendChild(newEl);

  // Force reflow then animate in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newEl.classList.remove('hidden-below', 'hidden-above');
      newEl.classList.add(direction === 'up' ? 'below' : 'above');
    });
  });

  currentExploreIdx = newIdx;

  // Clean up old hidden items after transition
  setTimeout(() => {
    const hidden = carousel.querySelectorAll('.hidden-above, .hidden-below');
    hidden.forEach(el => el.remove());

    // Make center item clickable
    const centerEl = carousel.querySelector('.center');
    if (centerEl) {
      centerEl.onclick = () => {
        const q = EXPLORE_QUESTIONS[currentExploreIdx];
        setMode('ask');
        setTimeout(() => sendMessage(q), 100);
      };
    }

    isSnapping = false;
  }, 450);
}

renderCarousel();

// Close
document.getElementById('close-btn').addEventListener('click', () => {
  if (window.opener) window.close();
  else if (document.referrer) window.location.href = document.referrer;
  else window.close();
});

// Mode
function setMode(mode) {
  currentMode = mode;
  actionBar.className = 'state-' + mode;

  if (mode === 'ask') {
    inputBar.classList.add('visible');
    exploreStrip.classList.remove('visible');
    stopExploreAutoAdvance();
    // Only auto-focus on desktop — on mobile, let user tap to avoid keyboard jarring
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (!isMobile) {
      setTimeout(() => msgInput.focus(), 350);
    }
    setTimeout(() => scrollToBottom(), 100);
  } else if (mode === 'explore') {
    inputBar.classList.remove('visible');
    exploreStrip.classList.add('visible');
    msgInput.blur();
    renderCarousel();
    startExploreAutoAdvance();
  } else {
    inputBar.classList.remove('visible');
    exploreStrip.classList.remove('visible');
    msgInput.blur();
    stopExploreAutoAdvance();
  }
  scrollToBottom();
}

askAction.addEventListener('click', () => {
  setMode(currentMode === 'ask' ? 'balanced' : 'ask');
});
exploreAction.addEventListener('click', () => {
  setMode(currentMode === 'explore' ? 'balanced' : 'explore');
});

// Auto-advance
let exploreInterval = null;
function startExploreAutoAdvance() {
  stopExploreAutoAdvance();
  exploreInterval = setInterval(() => {
    if (currentMode === 'explore' && !isSnapping) {
      const next = (currentExploreIdx + 1) % EXPLORE_QUESTIONS.length;
      snapTo(next, 'up');
    }
  }, 5000);
}
function stopExploreAutoAdvance() {
  if (exploreInterval) { clearInterval(exploreInterval); exploreInterval = null; }
}

// Swipe — one item at a time, regardless of velocity
let eTouchY = 0;
carousel.addEventListener('touchstart', e => {
  eTouchY = e.touches[0].clientY;
  stopExploreAutoAdvance();
}, { passive: true });

carousel.addEventListener('touchend', e => {
  const dy = eTouchY - e.changedTouches[0].clientY;
  const total = EXPLORE_QUESTIONS.length;
  if (Math.abs(dy) > 20) {
    if (dy > 0) {
      snapTo((currentExploreIdx + 1) % total, 'up');
    } else {
      snapTo((currentExploreIdx - 1 + total) % total, 'down');
    }
  }
  startExploreAutoAdvance();
});

// Chat
function addMessage(role, text) {
  const group = document.createElement('div');
  group.className = 'msg-group';
  const label = document.createElement('div');
  label.className = 'msg-label' + (role === 'user' ? ' user-label' : '');
  label.textContent = role === 'user' ? 'You' : 'Lens';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + (role === 'user' ? 'user' : 'lens');
  bubble.innerHTML = formatText(text);
  group.appendChild(label);
  group.appendChild(bubble);
  chatArea.appendChild(group);
  scrollToBottom();
}

function formatText(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  html = html.replace(/((?:<li>.+?<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<ul>') || p.startsWith('<ol>')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  return html || text;
}

function showThinking() {
  const el = document.createElement('div');
  el.className = 'msg-group'; el.id = 'thinking';
  el.innerHTML = '<div class="msg-label">Lens</div><div class="thinking-dots"><span></span><span></span><span></span></div>';
  chatArea.appendChild(el);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

async function sendMessage(text) {
  if (!text.trim() || isWaiting) return;
  isWaiting = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  msgInput.value = '';
  autoResizeInput();
  showThinking();

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: conversationHistory,
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024
      })
    });
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    const reply = data.content?.[0]?.text || data.text || "I couldn't process that. Let me try again.";
    removeThinking();
    addMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeThinking();
    addMessage('assistant', 'Connection issue — please try again in a moment.');
    console.error('API Error:', err);
  }

  isWaiting = false;
  sendBtn.disabled = false;
  setTimeout(() => setMode('balanced'), 800);
}

sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(msgInput.value);
  }
});

function autoResizeInput() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
}
msgInput.addEventListener('input', autoResizeInput);

// ─── Mobile keyboard handling ───
// Use a CSS custom property to always match the visual viewport height.
// This runs on every viewport change (keyboard open/close/resize).
const app = document.getElementById('app');

function setAppHeight() {
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-height', h + 'px');
  // On iOS, the viewport can scroll — pin app to top of visible area
  if (window.visualViewport) {
    app.style.top = window.visualViewport.offsetTop + 'px';
  }
  scrollToBottom();
}

// Set immediately
setAppHeight();

// Listen to visualViewport for reliable keyboard detection
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', setAppHeight);
  window.visualViewport.addEventListener('scroll', setAppHeight);
}
// Fallback
window.addEventListener('resize', setAppHeight);

// Extra insurance: poll briefly after focus to catch keyboard animation
msgInput.addEventListener('focus', () => {
  // Poll every 50ms for 600ms to catch the iOS keyboard animation
  let polls = 0;
  const poller = setInterval(() => {
    setAppHeight();
    polls++;
    if (polls >= 12) clearInterval(poller);
  }, 50);
});

msgInput.addEventListener('blur', () => {
  setTimeout(setAppHeight, 100);
  setTimeout(setAppHeight, 300);
});
</script>
