<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lens — NomoCoda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  background: #FFFFFF;
  color: #1a1a1a;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}

/* ─── Close button ─── */
#close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  font-size: 18px;
  color: #999;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  transition: color 0.2s;
}
#close-btn:hover { color: #333; }

/* ─── Chat area ─── */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 52px 16px 8px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  -webkit-overflow-scrolling: touch;
}

.msg-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 12px;
}

.msg-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #AFA9EC;
  font-weight: 600;
  padding: 0 4px;
}
.msg-label.user-label { text-align: right; }

.msg-bubble {
  max-width: 85%;
  padding: 10px 14px;
  background: #FFFFFF;
  border: 0.5px solid #CECBF6;
  font-size: 15px;
  line-height: 1.6;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg-bubble.lens { border-radius: 3px 14px 14px 14px; align-self: flex-start; }
.msg-bubble.user { border-radius: 14px 14px 3px 14px; align-self: flex-end; }

/* Thinking dots */
.thinking-dots {
  display: flex;
  gap: 4px;
  padding: 12px 14px;
  align-self: flex-start;
}
.thinking-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #CECBF6;
  animation: dotPulse 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ─── Bottom section ─── */
#bottom-section {
  flex-shrink: 0;
  border-top: 1px solid #f0f0f0;
  background: #fff;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

/* ─── Mode toggle (Ask / Explore) ─── */
#mode-toggle {
  display: flex;
  height: 44px;
  position: relative;
  overflow: hidden;
}

#ask-tab, #explore-tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  color: white;
}

#ask-tab { background: #4A90D9; }
#explore-tab { background: #4CAF50; }

/* Active/inactive states */
#mode-toggle.mode-ask #ask-tab { flex: 4; }
#mode-toggle.mode-ask #explore-tab { flex: 1; }
#mode-toggle.mode-explore #ask-tab { flex: 1; }
#mode-toggle.mode-explore #explore-tab { flex: 4; }
#mode-toggle.mode-balanced #ask-tab { flex: 1; }
#mode-toggle.mode-balanced #explore-tab { flex: 1; }

.tab-icon { font-size: 14px; }
.tab-label { white-space: nowrap; }

/* Compression animation */
#ask-tab:active, #explore-tab:active {
  transform: scaleY(0.94);
}
#ask-tab, #explore-tab {
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

/* ─── Explore questions strip ─── */
#explore-strip {
  display: none;
  padding: 10px 16px;
  background: #f8faf8;
  border-top: 1px solid #e8f5e9;
}

#explore-strip.visible { display: block; }

#explore-question {
  font-size: 14px;
  line-height: 1.5;
  color: #2e7d32;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid #c8e6c9;
  background: white;
  text-align: center;
  transition: background 0.2s;
  user-select: none;
}
#explore-question:hover { background: #f1f8e9; }
#explore-question:active { background: #e8f5e9; }

#explore-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}

#explore-nav button {
  background: none;
  border: none;
  color: #4CAF50;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.15s;
}
#explore-nav button:hover { background: #e8f5e9; }

#explore-counter {
  font-size: 11px;
  color: #999;
  font-weight: 500;
}

/* ─── Input bar ─── */
#input-bar {
  display: flex;
  align-items: flex-end;
  padding: 8px 12px 8px 12px;
  gap: 8px;
  background: #fff;
}

#msg-input {
  flex: 1;
  border: 1px solid #e0e0e0;
  background: #fafafa;
  color: #1a1a1a;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  padding: 10px 14px;
  border-radius: 22px;
  outline: none;
  resize: none;
  max-height: 100px;
  min-height: 42px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
#msg-input:focus { border-color: #CECBF6; }
#msg-input::placeholder { color: #bbb; }

#send-btn {
  width: 42px; height: 42px;
  border: none;
  background: #4A90D9;
  color: white;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.15s;
}
#send-btn:hover { background: #3a7bc8; }
#send-btn:active { transform: scale(0.93); }
#send-btn:disabled { background: #ccc; cursor: default; }

/* ─── Scrollbar ─── */
#chat-area::-webkit-scrollbar { width: 3px; }
#chat-area::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

/* ─── Message formatting ─── */
.msg-bubble strong { font-weight: 600; }
.msg-bubble em { font-style: italic; }
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 4px 0; }
.msg-bubble li { margin: 2px 0; }
.msg-bubble p { margin: 4px 0; }
.msg-bubble p:first-child { margin-top: 0; }
.msg-bubble p:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<div id="app">
  <button id="close-btn" aria-label="Close">&times;</button>

  <div id="chat-area">
    <div class="msg-group">
      <div class="msg-label">Lens</div>
      <div class="msg-bubble lens">Good morning. What should we tackle today?</div>
    </div>
  </div>

  <div id="bottom-section">
    <!-- Mode toggle -->
    <div id="mode-toggle" class="mode-balanced">
      <button id="ask-tab">
        <span class="tab-icon">&#9998;</span>
        <span class="tab-label">Ask</span>
      </button>
      <button id="explore-tab">
        <span class="tab-icon">&#10024;</span>
        <span class="tab-label">Explore</span>
      </button>
    </div>

    <!-- Explore question strip (shown when Explore is active) -->
    <div id="explore-strip">
      <div id="explore-question"></div>
      <div id="explore-nav">
        <button id="prev-q" aria-label="Previous question">&#8249;</button>
        <span id="explore-counter"></span>
        <button id="next-q" aria-label="Next question">&#8250;</button>
      </div>
    </div>

    <!-- Input bar (always visible) -->
    <div id="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Ask Lens anything..."></textarea>
      <button id="send-btn" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───
const PROXY_URL = 'https://lens-api-proxy.nomocoda.workers.dev';

const SYSTEM_PROMPT = `You are Lens, the strategic intelligence layer for Acme Industrial — a 300-person mid-market manufacturer in Columbus, Ohio. Custom precision components for automotive, aerospace, and industrial equipment. Complete visibility across all connected systems.

FINANCIALS: $38M revenue, Q1 tracking 3% below Q2 target of $9.8M. Gross margin 34%. Steel costs up 11% since Jan. Overdue: Keller Automotive $214K (45+ days), Midwest Fabricators $87K. CapEx: $1.2M approved for Facility 2 press upgrade, pending contractor.
CLIENTS: 42 active contracts. HIGH RISK — Keller Automotive: $4.1M, renewal 67 days, engagement dropping, 2 QBRs missed. HEALTHY — Orion Aerospace: $6.8M, 2-year extension just signed. WATCH — Hartwell Equipment: $1.1M new client, 3 quality concerns in 60 days. PIPELINE — Summit Defense $3.2M final negotiations (wants July 15 vs Aug); Meridian Auto Parts $2.1M went quiet 3 weeks ago.
PRODUCTION: Facility 1 Columbus 94% capacity on schedule. Facility 2 Cleveland 78% — press line 3 calibration issue causing 6-8% yield loss on aerospace parts, Dave Kowalski flagged 3x. Facility 3 Detroit 61% ramping for Hartwell. OTD 91.3% vs 95% target.
VENDORS: Midwest Steel renewal 45 days, wants +8% increase. Alternative: Great Lakes Alloys qualified not contracted. RISK: Precision Coatings Inc sole-source aerospace supplier, late 2 of last 4 deliveries, no alternative — Orion contract depends on this. Freight rates up 7%.
PEOPLE: Director of Quality Priya Nair resigned, last day April 15 — was AS9100 audit lead, recert June 14, no replacement search started. Plant Mgr F2 Dave Kowalski waiting on maintenance budget. Engineering fully allocated through Q2 on Summit Defense pre-production. Open: 4 CNC operators, 1 Quality Engineer.
MARKET: Manufacturing World conference May 12 Chicago — major defense and aerospace procurement teams attending, Summit Defense rumored present. Steel tariffs under Congressional review — potential 15% increase. Competitor Apex Precision expanding into aerospace. Regional freight consortium forming — members locking 3-year rates 12% below spot market, deadline April 30.
SLACK: Dave Kowalski "Third time flagging press line 3 — need budget decision this week or we'll miss Orion window." Finance "Keller payment outstanding — flag to CEO?" Sales "Summit Defense asking for accelerated timeline."

You ARE Lens. Never say you are Claude or an AI. Be concise, synthesized, actionable. Reference specific data naturally. When restricted access applies, acknowledge what you can see, note the gap, offer to facilitate. Remember everything from this conversation.

Tone: Lead with optimism and opportunity, not just risk. For every challenge you surface, look for the corresponding opportunity or bright spot. Celebrate wins proactively. Balance is key: informed and clear-eyed, but always forward-leaning and energizing.`;

const EXPLORE_QUESTIONS = [
  "Are any projects at risk of missing their milestones this week?",
  "If we switch vendors on our primary supplier contract, does the ops team have capacity to manage the transition?",
  "We have a booth at Manufacturing World in May — what's our current readiness across sales, ops, and product?",
  "What decisions are awaiting a response from me right now?",
  "Which clients show signs of reduced engagement and could be good candidates for AI alternatives?",
  "Which vendor contracts or renewals are coming up in the next 90 days?",
  "What market shifts could affect our operations in the next 2 quarters?",
  "What's the status of our top 3 active client engagements this week?",
  "Where does our internal AI compliance workflow stand, and are we on track for the next audit cycle?"
];

// ─── STATE ───
let conversationHistory = [];
let currentExploreIdx = 0;
let currentMode = 'balanced';
let isWaiting = false;

// ─── DOM ───
const chatArea = document.getElementById('chat-area');
const modeToggle = document.getElementById('mode-toggle');
const askTab = document.getElementById('ask-tab');
const exploreTab = document.getElementById('explore-tab');
const exploreStrip = document.getElementById('explore-strip');
const exploreQuestion = document.getElementById('explore-question');
const exploreCounter = document.getElementById('explore-counter');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const closeBtn = document.getElementById('close-btn');

// ─── INIT ───
updateExploreDisplay();

// ─── CLOSE ───
closeBtn.addEventListener('click', () => {
  if (window.opener) window.close();
  else if (document.referrer) window.location.href = document.referrer;
  else window.close();
});

// ─── MODE SWITCHING ───
function setMode(mode) {
  currentMode = mode;
  modeToggle.className = 'mode-' + mode;

  if (mode === 'explore') {
    exploreStrip.classList.add('visible');
    msgInput.placeholder = 'Or type your own question...';
  } else {
    exploreStrip.classList.remove('visible');
    msgInput.placeholder = 'Ask Lens anything...';
  }

  if (mode === 'ask') {
    msgInput.focus();
  }

  scrollToBottom();
}

askTab.addEventListener('click', () => {
  setMode(currentMode === 'ask' ? 'balanced' : 'ask');
});

exploreTab.addEventListener('click', () => {
  setMode(currentMode === 'explore' ? 'balanced' : 'explore');
});

// ─── EXPLORE ───
function updateExploreDisplay() {
  exploreQuestion.textContent = EXPLORE_QUESTIONS[currentExploreIdx];
  exploreCounter.textContent = (currentExploreIdx + 1) + ' / ' + EXPLORE_QUESTIONS.length;
}

document.getElementById('next-q').addEventListener('click', () => {
  currentExploreIdx = (currentExploreIdx + 1) % EXPLORE_QUESTIONS.length;
  updateExploreDisplay();
});

document.getElementById('prev-q').addEventListener('click', () => {
  currentExploreIdx = (currentExploreIdx - 1 + EXPLORE_QUESTIONS.length) % EXPLORE_QUESTIONS.length;
  updateExploreDisplay();
});

exploreQuestion.addEventListener('click', () => {
  const q = EXPLORE_QUESTIONS[currentExploreIdx];
  sendMessage(q);
});

// Swipe up/down on explore strip to cycle
let exploreTouchStartY = 0;
exploreStrip.addEventListener('touchstart', (e) => {
  exploreTouchStartY = e.touches[0].clientY;
}, { passive: true });
exploreStrip.addEventListener('touchend', (e) => {
  const dy = exploreTouchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 30) {
    if (dy > 0) {
      currentExploreIdx = (currentExploreIdx + 1) % EXPLORE_QUESTIONS.length;
    } else {
      currentExploreIdx = (currentExploreIdx - 1 + EXPLORE_QUESTIONS.length) % EXPLORE_QUESTIONS.length;
    }
    exploreQuestion.style.transition = 'opacity 0.15s';
    exploreQuestion.style.opacity = '0';
    setTimeout(() => {
      updateExploreDisplay();
      exploreQuestion.style.opacity = '1';
    }, 150);
  }
});

// ─── CHAT ───
function addMessage(role, text) {
  const group = document.createElement('div');
  group.className = 'msg-group';

  const label = document.createElement('div');
  label.className = 'msg-label' + (role === 'user' ? ' user-label' : '');
  label.textContent = role === 'user' ? 'You' : 'Lens';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + (role === 'user' ? 'user' : 'lens');
  bubble.innerHTML = formatText(text);

  group.appendChild(label);
  group.appendChild(bubble);
  chatArea.appendChild(group);
  scrollToBottom();
}

function formatText(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

  html = html.replace(/((?:<li>.+?<\/li>\n?)+)/g, '<ul>$1</ul>');

  html = html.split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<ul>') || p.startsWith('<ol>')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  return html || text;
}

function showThinking() {
  const el = document.createElement('div');
  el.className = 'msg-group';
  el.id = 'thinking';
  el.innerHTML = '<div class="msg-label">Lens</div><div class="thinking-dots"><span></span><span></span><span></span></div>';
  chatArea.appendChild(el);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

async function sendMessage(text) {
  if (!text.trim() || isWaiting) return;
  isWaiting = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  msgInput.value = '';
  autoResizeInput();
  showThinking();

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: conversationHistory,
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024
      })
    });

    if (!res.ok) throw new Error('API error: ' + res.status);

    const data = await res.json();
    const reply = data.content?.[0]?.text || data.text || "I couldn't process that. Let me try again.";

    removeThinking();
    addMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeThinking();
    addMessage('assistant', 'Connection issue — please try again in a moment.');
    console.error('API Error:', err);
  }

  isWaiting = false;
  sendBtn.disabled = false;

  // Return to balanced after response
  setTimeout(() => setMode('balanced'), 800);
}

// ─── INPUT ───
sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(msgInput.value);
  }
});

function autoResizeInput() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
}
msgInput.addEventListener('input', autoResizeInput);

// ─── MOBILE KEYBOARD HANDLING ───
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('app').style.height = window.visualViewport.height + 'px';
    scrollToBottom();
  });
  window.visualViewport.addEventListener('scroll', () => {
    document.getElementById('app').style.height = window.visualViewport.height + 'px';
  });
}

// Focus input on load for desktop
if (!/Mobi|Android/i.test(navigator.userAgent)) {
  msgInput.focus();
}
</script>
</body>
</html>
